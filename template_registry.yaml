# Template Registry -- maps to real MCQC templates from Project/0-MCQC/2-flow/min_pulse_width/
#
# Matching rules:
#   - Patterns use fnmatch syntax (*, ?, [seq])
#   - First match wins (most specific patterns first)
#   - "any" matches all values for that field
#   - User can bypass with --template /path/to/custom.sp
#
# All templates below are the original TSMC ADC Timing Team templates.

templates:

  # ============================================================
  # SYNC cells (most specific first)
  # ============================================================

  # SYNC1P5 with Q1 probe
  - pattern: "*SYNC1P5*"
    arc_type: any
    rel_pin: CP
    rel_dir: fall
    constr_dir: rise
    template: min_pulse_width/template__sync1p5__q1__CP__fall__rise__1.sp
    note: "SYNC1P5 Q1 probe CP fall"

  - pattern: "*SYNC1P5*"
    arc_type: any
    rel_pin: CPN
    rel_dir: rise
    constr_dir: fall
    template: min_pulse_width/template__sync1p5__q1__CPN__rise__fall__1.sp
    note: "SYNC1P5 Q1 probe CPN rise"

  - pattern: "*SYNC1P5*"
