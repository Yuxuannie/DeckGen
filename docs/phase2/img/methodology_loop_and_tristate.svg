<svg xmlns="http://www.w3.org/2000/svg" width="880" height="1400"><rect width="880" height="1400" fill="white"/>
<defs><marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#666"/></marker></defs>
<text x="24" y="32" font-family="monospace" font-size="15" text-anchor="start" fill="#111" font-weight="bold">Two sticking points, made concrete</text>
<text x="24" y="64" font-family="monospace" font-size="13.5" text-anchor="start" fill="#85c" font-weight="bold">A.  Why a loop stores a bit -- walk the two inverters with real 0/1 values</text>
<text x="24" y="84" font-family="monospace" font-size="11" text-anchor="start" fill="#555" font-weight="normal">master loop:   ml_a --[inv1: ml_b = NOT ml_a]--&gt; ml_b --[inv2: ml_a = NOT ml_b]--&gt; back to ml_a</text>
<rect x="40" y="110" width="380" height="150" rx="6" fill="#f6f0ff" stroke="#333" stroke-width="1.3" />
<text x="56" y="132" font-family="monospace" font-size="12" text-anchor="start" fill="#111" font-weight="bold">State 1: suppose ml_a = 1</text>
<text x="70" y="160" font-family="monospace" font-size="12" text-anchor="start" fill="#070" font-weight="normal">ml_a = 1</text>
<polygon points="180,140 180,172 210,156" fill="#fff" stroke="#333"/><circle cx="215" cy="156" r="4" fill="#fff" stroke="#333"/>
<text x="150" y="148" font-family="monospace" font-size="1" text-anchor="start" fill="#111" font-weight="normal"></text>
<text x="195" y="148" font-family="monospace" font-size="1" text-anchor="start" fill="#111" font-weight="normal"></text>
<text x="150" y="148" font-family="monospace" font-size="1" text-anchor="start" fill="#111" font-weight="normal"></text>
<line x1="135" y1="148" x2="180" y2="148" stroke="#666" stroke-width="1.4" marker-end="url(#g)"/>
<text x="225" y="148" font-family="monospace" font-size="12" text-anchor="start" fill="#070" font-weight="normal">-&gt; ml_b = 0</text>
<text x="56" y="182" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">feed ml_b=0 into inv2:</text>
<text x="70" y="202" font-family="monospace" font-size="12" text-anchor="start" fill="#070" font-weight="normal">ml_b = 0  -&gt;  ml_a = NOT 0 = 1</text>
<text x="56" y="226" font-family="monospace" font-size="11" text-anchor="start" fill="#060" font-weight="bold">=&gt; back to ml_a=1. CONSISTENT (self-agrees).</text>
<rect x="460" y="110" width="380" height="150" rx="6" fill="#f6f0ff" stroke="#333" stroke-width="1.3" />
<text x="476" y="132" font-family="monospace" font-size="12" text-anchor="start" fill="#111" font-weight="bold">State 2: suppose ml_a = 0</text>
<text x="490" y="148" font-family="monospace" font-size="12" text-anchor="start" fill="#a00" font-weight="normal">ml_a = 0</text>
<line x1="555" y1="148" x2="600" y2="148" stroke="#666" stroke-width="1.4" marker-end="url(#g)"/>
<polygon points="600,132 600,164 630,148" fill="#fff" stroke="#333"/><circle cx="635" cy="148" r="4" fill="#fff" stroke="#333"/>
<text x="645" y="148" font-family="monospace" font-size="12" text-anchor="start" fill="#a00" font-weight="normal">-&gt; ml_b = 1</text>
<text x="476" y="182" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">feed ml_b=1 into inv2:</text>
<text x="490" y="202" font-family="monospace" font-size="12" text-anchor="start" fill="#a00" font-weight="normal">ml_b = 1  -&gt;  ml_a = NOT 1 = 0</text>
<text x="476" y="226" font-family="monospace" font-size="11" text-anchor="start" fill="#060" font-weight="bold">=&gt; back to ml_a=0. ALSO CONSISTENT.</text>
<text x="40" y="266" font-family="monospace" font-size="11.5" text-anchor="start" fill="#111" font-weight="normal">BOTH ml_a=1 and ml_a=0 are self-consistent and stable. The loop can sit in EITHER</text>
<text x="40" y="286" font-family="monospace" font-size="11.5" text-anchor="start" fill="#528" font-weight="bold">-&gt; it 'remembers' which one you last forced in. That is one stored bit.</text>
<text x="40" y="310" font-family="monospace" font-size="10.5" text-anchor="start" fill="#888" font-weight="normal">(2 inversions around the loop = reinforcing. A single inverter like clkb=NOT CP has only</text>
<text x="40" y="328" font-family="monospace" font-size="10.5" text-anchor="start" fill="#888" font-weight="normal">one consistent answer for a given CP -&gt; cannot remember.)</text>
<text x="24" y="470" font-family="monospace" font-size="13.5" text-anchor="start" fill="#a55" font-weight="bold">B.  The tristate 'drop the drain-only nodes' cleanup</text>
<text x="24" y="490" font-family="monospace" font-size="11" text-anchor="start" fill="#555" font-weight="normal">A clocked (tristate) inverter stacks transistors. The nodes BETWEEN stacked transistors</text>
<text x="24" y="508" font-family="monospace" font-size="11" text-anchor="start" fill="#555" font-weight="normal">are internal -- they are source/drain only, they never drive a gate.</text>
<text x="155" y="532" font-family="monospace" font-size="11" text-anchor="middle" fill="#111" font-weight="normal">VDD</text>
<line x1="155" y1="540" x2="155" y2="550" stroke="#333"/>
<rect x="120" y="550" width="70" height="30" rx="6" fill="#eef" stroke="#333" stroke-width="1.3" /><text x="155" y="569" font-family="monospace" font-size="10" text-anchor="middle" fill="#111" font-weight="normal">P1</text><text x="200" y="570" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">gate=clk</text>
<text x="320" y="570" font-family="monospace" font-size="10" text-anchor="start" fill="#c00" font-weight="normal">internal node A  (drain of P1 / source of P2)</text>
<circle cx="155" cy="588" r="4" fill="#c00"/>
<rect x="120" y="590" width="70" height="30" rx="6" fill="#eef" stroke="#333" stroke-width="1.3" /><text x="155" y="609" font-family="monospace" font-size="10" text-anchor="middle" fill="#111" font-weight="normal">P2</text><text x="200" y="610" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">gate=in</text>
<line x1="155" y1="620" x2="155" y2="632" stroke="#333"/>
<rect x="118" y="632" width="74" height="4" rx="2" fill="#070" stroke="#333" stroke-width="1.3" />
<text x="320" y="640" font-family="monospace" font-size="10" text-anchor="start" fill="#070" font-weight="normal">OUT  (the real output -- this one IS used as a gate downstream)</text>
<rect x="120" y="636" width="70" height="30" rx="6" fill="#eef" stroke="#333" stroke-width="1.3" /><text x="155" y="655" font-family="monospace" font-size="10" text-anchor="middle" fill="#111" font-weight="normal">N1</text><text x="200" y="656" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">gate=in</text>
<circle cx="155" cy="674" r="4" fill="#c00"/>
<text x="320" y="678" font-family="monospace" font-size="10" text-anchor="start" fill="#c00" font-weight="normal">internal node B  (drain of N1 / source of N2)</text>
<rect x="120" y="676" width="70" height="30" rx="6" fill="#eef" stroke="#333" stroke-width="1.3" /><text x="155" y="695" font-family="monospace" font-size="10" text-anchor="middle" fill="#111" font-weight="normal">N2</text><text x="200" y="696" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">gate=clk</text>
<text x="155" y="726" font-family="monospace" font-size="11" text-anchor="middle" fill="#111" font-weight="normal">VSS</text>
<line x1="155" y1="706" x2="155" y2="716" stroke="#333"/>
<rect x="470" y="550" width="370" height="180" rx="6" fill="#fff7ee" stroke="#333" stroke-width="1.3" />
<text x="486" y="572" font-family="monospace" font-size="12" text-anchor="start" fill="#a55" font-weight="bold">what the graph does with this</text>
<text x="486" y="594" font-family="monospace" font-size="10.5" text-anchor="start" fill="#222" font-weight="normal">source-&gt;drain edges connect A and B into</text>
<text x="486" y="612" font-family="monospace" font-size="10.5" text-anchor="start" fill="#222" font-weight="normal">the same loop as OUT -&gt; the SCC bloats to</text>
<text x="486" y="630" font-family="monospace" font-size="10.5" text-anchor="start" fill="#222" font-weight="normal">{OUT, A, B} instead of just {OUT}.</text>
<text x="486" y="648" font-family="monospace" font-size="10.5" text-anchor="start" fill="#222" font-weight="normal"></text>
<text x="486" y="666" font-family="monospace" font-size="10.5" text-anchor="start" fill="#222" font-weight="normal">BUT A and B never appear as a 'gate=' of any</text>
<text x="486" y="684" font-family="monospace" font-size="10.5" text-anchor="start" fill="#222" font-weight="normal">transistor -- they control nothing.</text>
<text x="486" y="702" font-family="monospace" font-size="10.5" text-anchor="start" fill="#222" font-weight="normal"></text>
<text x="486" y="720" font-family="monospace" font-size="10.5" text-anchor="start" fill="#060" font-weight="normal">FIX: keep only SCC members that are also a</text>
<text x="486" y="738" font-family="monospace" font-size="10.5" text-anchor="start" fill="#222" font-weight="normal">gate somewhere.  A, B drop out; OUT stays.</text>
<text x="40" y="745" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="bold">This is why the real cell's master/slave went from 4 nodes back to a clean 2+2:</text>
<text x="40" y="763" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">the extra net_XMSA6#d-style nodes were exactly these drain-only stack internals.</text>
</svg>