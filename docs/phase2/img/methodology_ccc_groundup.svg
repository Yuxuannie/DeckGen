<svg xmlns="http://www.w3.org/2000/svg" width="880" height="1500"><rect width="880" height="1500" fill="white"/>
<defs><marker id="g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#666"/></marker><marker id="p" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#85c"/></marker><marker id="r" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#c00"/></marker></defs>
<text x="24" y="32" font-family="monospace" font-size="14.5" text-anchor="start" fill="#111" font-weight="bold">CCC, from the ground up:  why a latch becomes a CYCLE (and a cycle means memory)</text>
<rect x="24" y="50" width="832" height="170" rx="6" fill="#f7fbff" stroke="#333" stroke-width="1.3" />
<text x="40" y="72" font-family="monospace" font-size="13" text-anchor="start" fill="#258" font-weight="bold">A.  Start from the actual transistors (real device lines)</text>
<text x="40" y="94" font-family="monospace" font-size="11" text-anchor="start" fill="#555" font-weight="normal">master latch -- 4 transistors = two inverters:</text>
<text x="48" y="114" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">XMLA0  pmos  gate=ml_a  src=VDD  -&gt; drain=ml_b     inverter #1:</text>
<text x="48" y="132" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">XMLA1  nmos  gate=ml_a  src=VSS  -&gt; drain=ml_b        ml_b = NOT ml_a</text>
<text x="48" y="150" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">XMFA0  pmos  gate=ml_b  src=VDD  -&gt; drain=ml_a     inverter #2 (feedback):</text>
<text x="48" y="168" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">XMFA1  nmos  gate=ml_b  src=VSS  -&gt; drain=ml_a        ml_a = NOT ml_b</text>
<text x="40" y="192" font-family="monospace" font-size="11" text-anchor="start" fill="#555" font-weight="normal">clock buffer -- for contrast:</text>
<text x="48" y="208" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">XCKA0  pmos  gate=CP    src=VDD  -&gt; drain=clkb    inverter: clkb = NOT CP</text>
<rect x="24" y="232" width="832" height="150" rx="6" fill="#fff7ee" stroke="#333" stroke-width="1.3" />
<text x="40" y="254" font-family="monospace" font-size="13" text-anchor="start" fill="#a55" font-weight="bold">B.  The one rule:  edge  gate -&gt; drain   (the controller -&gt; the controlled)</text>
<text x="40" y="276" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">A CMOS inverter's INPUT is the gate; its OUTPUT is the drain. Change the input,</text>
<text x="40" y="294" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">the output changes.  So 'gate net' controls 'drain net'.  Draw an arrow gate -&gt; drain.</text>
<polygon points="560,300 560,344 600,322" fill="#fff" stroke="#333"/>
<circle cx="606" cy="322" r="5" fill="#fff" stroke="#333"/>
<line x1="510" y1="322" x2="560" y2="322" stroke="#666" stroke-width="1.5" marker-end="url(#g)"/>
<line x1="611" y1="322" x2="670" y2="322" stroke="#666" stroke-width="1.5" marker-end="url(#g)"/>
<text x="506" y="314" font-family="monospace" font-size="10" text-anchor="end" fill="#258" font-weight="normal">in</text>
<text x="506" y="338" font-family="monospace" font-size="9" text-anchor="end" fill="#888" font-weight="normal">(gate)</text>
<text x="676" y="314" font-family="monospace" font-size="10" text-anchor="start" fill="#258" font-weight="normal">out</text>
<text x="676" y="338" font-family="monospace" font-size="9" text-anchor="start" fill="#888" font-weight="normal">(drain)</text>
<text x="40" y="360" font-family="monospace" font-size="10.5" text-anchor="start" fill="#888" font-weight="normal">(pass transistors add source -&gt; drain too: an on switch passes its source to its drain.)</text>
<rect x="24" y="394" width="832" height="250" rx="6" fill="#fdf0ff" stroke="#333" stroke-width="1.3" />
<text x="40" y="416" font-family="monospace" font-size="13" text-anchor="start" fill="#85c" font-weight="bold">C.  Apply it to the master pair  -&gt;  the arrows form a LOOP</text>
<rect x="125" y="514" width="90" height="40" rx="6" fill="#e7d6ff" stroke="#333" stroke-width="1.3" /><text x="170" y="539" font-family="monospace" font-size="13" text-anchor="middle" fill="#111" font-weight="bold">ml_a</text>
<rect x="515" y="514" width="90" height="40" rx="6" fill="#e7d6ff" stroke="#333" stroke-width="1.3" /><text x="560" y="539" font-family="monospace" font-size="13" text-anchor="middle" fill="#111" font-weight="bold">ml_b</text>
<path d="M215,526 C320,464 410,464 515,526" fill="none" stroke="#85c" stroke-width="2.2" marker-end="url(#p)"/>
<text x="365.0" y="468" font-family="monospace" font-size="11" text-anchor="middle" fill="#85c" font-weight="normal">inverter #1  (XMLA0/1, gate=ml_a -&gt; drain=ml_b):  ml_b = NOT ml_a</text>
<path d="M515,542 C410,604 320,604 215,542" fill="none" stroke="#c00" stroke-width="2.2" marker-end="url(#r)"/>
<text x="365.0" y="616" font-family="monospace" font-size="11" text-anchor="middle" fill="#c00" font-weight="normal">inverter #2 / FEEDBACK  (XMFA0/1, gate=ml_b -&gt; drain=ml_a):  ml_a = NOT ml_b</text>
<text x="40" y="630" font-family="monospace" font-size="11" text-anchor="start" fill="#528" font-weight="bold">ml_a controls ml_b, and ml_b controls ml_a back  =&gt;  a closed LOOP (a 2-cycle).</text>
<rect x="24" y="656" width="832" height="120" rx="6" fill="#eef7ff" stroke="#333" stroke-width="1.3" />
<text x="40" y="678" font-family="monospace" font-size="13" text-anchor="start" fill="#258" font-weight="bold">D.  Contrast: the clock buffer clkb has NO loop</text>
<rect x="100" y="718" width="80" height="36" rx="14" fill="#fff" stroke="#333" stroke-width="1.3" /><text x="140" y="741" font-family="monospace" font-size="12" text-anchor="middle" fill="#111" font-weight="normal">CP</text>
<rect x="310" y="718" width="90" height="36" rx="6" fill="#eaf3ff" stroke="#333" stroke-width="1.3" /><text x="355" y="741" font-family="monospace" font-size="12" text-anchor="middle" fill="#111" font-weight="normal">clkb</text>
<line x1="180" y1="736" x2="310" y2="736" stroke="#258" stroke-width="2" marker-end="url(#g)"/>
<text x="245" y="726" font-family="monospace" font-size="10" text-anchor="middle" fill="#258" font-weight="normal">NOT</text>
<text x="430" y="734" font-family="monospace" font-size="10.5" text-anchor="start" fill="#555" font-weight="normal">clkb then fans out to ml_a, sl_a ...</text>
<text x="430" y="752" font-family="monospace" font-size="10.5" text-anchor="start" fill="#a00" font-weight="normal">but NOTHING drives back to clkb  -&gt; no cycle.</text>
<rect x="24" y="788" width="832" height="180" rx="6" fill="#fff0f3" stroke="#333" stroke-width="1.3" />
<text x="40" y="812" font-family="monospace" font-size="13" text-anchor="start" fill="#a35" font-weight="bold">E.  WHY a loop = memory  (the key intuition)</text>
<text x="40" y="836" font-family="monospace" font-size="11" text-anchor="start" fill="#222" font-weight="normal">LOOP (ml_a, ml_b):  ml_a is set by ml_b, and ml_b is set by ml_a.  Right now nothing</text>
<text x="40" y="856" font-family="monospace" font-size="11" text-anchor="start" fill="#222" font-weight="normal">   outside forces either one -- they hold EACH OTHER. Two stable states are possible</text>
<text x="40" y="876" font-family="monospace" font-size="11" text-anchor="start" fill="#060" font-weight="bold">   (ml_a=0/ml_b=1  or  ml_a=1/ml_b=0). It stays where you put it  =&gt;  it REMEMBERS a bit.</text>
<text x="40" y="896" font-family="monospace" font-size="11" text-anchor="start" fill="#222" font-weight="normal"></text>
<text x="40" y="916" font-family="monospace" font-size="11" text-anchor="start" fill="#222" font-weight="normal">NO LOOP (clkb):  clkb is forced by CP every instant (clkb = NOT CP). It cannot disagree</text>
<text x="40" y="936" font-family="monospace" font-size="11" text-anchor="start" fill="#060" font-weight="bold">   with its input, has no second stable state  =&gt;  pure combinational, NO memory.</text>
<rect x="24" y="980" width="832" height="110" rx="6" fill="#eefaef" stroke="#333" stroke-width="1.3" />
<text x="40" y="1004" font-family="monospace" font-size="13" text-anchor="start" fill="#3a3" font-weight="bold">F.  So the algorithm just finds the loops</text>
<text x="40" y="1028" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">Build the gate-&gt;drain graph for the WHOLE cell, then run Tarjan SCC = 'find all cycles'.</text>
<text x="40" y="1048" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">Every size&gt;=2 cycle is a place that holds state. {ml_a,ml_b} and {sl_a,sl_b} are cycles;</text>
<text x="40" y="1068" font-family="monospace" font-size="11" text-anchor="start" fill="#060" font-weight="bold">clkb, seb, mi, Q are not. That is how storage is found with NO names.</text>
<rect x="24" y="1102" width="832" height="160" rx="6" fill="#f4f4ff" stroke="#333" stroke-width="1.3" />
<text x="40" y="1126" font-family="monospace" font-size="13" text-anchor="start" fill="#446" font-weight="bold">G.  Two clean-ups (already covered, recap)</text>
<text x="40" y="1150" font-family="monospace" font-size="11" text-anchor="start" fill="#222" font-weight="normal">1. KEEP GATE MEMBERS: a real storage node must also be a gate somewhere (it controls).</text>
<text x="40" y="1169" font-family="monospace" font-size="11" text-anchor="start" fill="#222" font-weight="normal">   Tristate latches add series-stack nodes that are drains only -&gt; drop them (SCC ∩ gates).</text>
<text x="40" y="1188" font-family="monospace" font-size="11" text-anchor="start" fill="#222" font-weight="normal">2. MASTER vs SLAVE: BFS hop-distance to output Q.  sl_a -&gt; Q is 1 hop (slave);</text>
<text x="40" y="1207" font-family="monospace" font-size="11" text-anchor="start" fill="#222" font-weight="normal">   ml_a -&gt; ml_b -&gt; sl_a -&gt; Q is further (master).</text>
<text x="40" y="1226" font-family="monospace" font-size="11" text-anchor="start" fill="#222" font-weight="normal"></text>
<text x="40" y="1245" font-family="monospace" font-size="11" text-anchor="start" fill="#528" font-weight="bold">RESULT (name-blind):  master {ml_a, ml_b}   slave {sl_a, sl_b}</text>
</svg>