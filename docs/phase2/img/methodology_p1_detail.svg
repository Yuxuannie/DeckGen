<svg xmlns="http://www.w3.org/2000/svg" width="880" height="1330"><rect width="880" height="1330" fill="white"/>
<defs><marker id="g" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#888"/></marker></defs>
<text x="24" y="32" font-family="monospace" font-size="15" text-anchor="start" fill="#111" font-weight="bold">S2 / P1 detail -- proving sensitization by Boolean DIFFERENCE</text>
<text x="24" y="52" font-family="monospace" font-size="10.5" text-anchor="start" fill="#666" font-weight="normal">Question: which static side-pin values make D -- and ONLY D -- reach the latch? (no z3: enumerate + evaluate)</text>
<rect x="24" y="66" width="832" height="150" rx="6" fill="#f7fbff" stroke="#333" stroke-width="1.3" />
<text x="40" y="88" font-family="monospace" font-size="12" text-anchor="start" fill="#258" font-weight="bold">the data path being tested</text>
<rect x="60" y="110" width="70" height="28" rx="14" fill="#fff" stroke="#333" stroke-width="1.3" /><text x="95" y="128" font-family="monospace" font-size="11" text-anchor="middle" fill="#111" font-weight="normal">D</text>
<rect x="60" y="158" width="70" height="28" rx="14" fill="#fff" stroke="#333" stroke-width="1.3" /><text x="95" y="176" font-family="monospace" font-size="11" text-anchor="middle" fill="#111" font-weight="normal">SI</text>
<rect x="200" y="134" width="70" height="28" rx="6" fill="#fff0d8" stroke="#333" stroke-width="1.3" /><text x="235.0" y="152" font-family="monospace" font-size="11" text-anchor="middle" fill="#111" font-weight="normal">mux</text>
<text x="235" y="178" font-family="monospace" font-size="10" text-anchor="middle" fill="#a70" font-weight="normal">select=SE</text>
<rect x="330" y="134" width="70" height="28" rx="6" fill="#fff0d8" stroke="#333" stroke-width="1.3" /><text x="365.0" y="152" font-family="monospace" font-size="11" text-anchor="middle" fill="#111" font-weight="normal">mi</text>
<rect x="470" y="120" width="70" height="28" rx="6" fill="#e7d6ff" stroke="#333" stroke-width="1.3" /><text x="505.0" y="138" font-family="monospace" font-size="11" text-anchor="middle" fill="#111" font-weight="normal">ml_a</text>
<rect x="470" y="162" width="70" height="28" rx="6" fill="#e7d6ff" stroke="#333" stroke-width="1.3" /><text x="505.0" y="180" font-family="monospace" font-size="11" text-anchor="middle" fill="#111" font-weight="normal">ml_b</text>
<text x="505" y="106" font-family="monospace" font-size="10" text-anchor="middle" fill="#85c" font-weight="normal">master latch</text>
<line x1="130" y1="124" x2="200" y2="144" stroke="#888" stroke-width="1.5" marker-end="url(#g)"/>
<line x1="130" y1="172" x2="200" y2="152" stroke="#888" stroke-width="1.5" marker-end="url(#g)"/>
<line x1="270" y1="148" x2="330" y2="148" stroke="#888" stroke-width="1.5" marker-end="url(#g)"/>
<line x1="400" y1="148" x2="470" y2="136" stroke="#888" stroke-width="1.5" marker-end="url(#g)"/>
<path d="M540,134" />
<rect x="560" y="120" width="150" height="42" rx="6" fill="none" stroke="#c00" stroke-width="1.4" stroke-dasharray="5,3"/>
<text x="635" y="144" font-family="monospace" font-size="9.5" text-anchor="middle" fill="#c00" font-weight="normal">keeper feedback</text>
<text x="635" y="158" font-family="monospace" font-size="9.5" text-anchor="middle" fill="#c00" font-weight="normal">BROKEN for the test</text>
<text x="40" y="206" font-family="monospace" font-size="10.5" text-anchor="start" fill="#111" font-weight="normal">SE picks D vs SI into the latch. We hold the latch transparent (clock phase) and break its keeper,</text>
<rect x="24" y="232" width="832" height="86" rx="6" fill="#f4f8ff" stroke="#333" stroke-width="1.3" />
<text x="40" y="254" font-family="monospace" font-size="13" text-anchor="start" fill="#258" font-weight="bold">STEP 1  Break the keeper, fix the transparent clock phase</text>
<text x="40" y="276" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">A latch fights the input with its feedback. Break the cross-coupled keeper devices so the</text>
<text x="40" y="294" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">input drives the storage node cleanly (models: write path overpowers keeper while transparent).</text>
<rect x="24" y="330" width="832" height="290" rx="6" fill="#fff7ee" stroke="#333" stroke-width="1.3" />
<text x="40" y="352" font-family="monospace" font-size="13" text-anchor="start" fill="#a55" font-weight="bold">STEP 2  Evaluate master(ml_a) for EVERY (CP, SE, SI), with D=0 and D=1</text>
<text x="40" y="372" font-family="monospace" font-size="10.5" text-anchor="start" fill="#555" font-weight="normal">d/dD = 1 means: toggling D flips the captured value = D controls capture.   (X = undriven/opaque)</text>
<text x="70" y="402" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="bold">CP   SE   SI  |  ml_a(D=0)   ml_a(D=1)  |  D controls?</text>
<line x1="70" y1="408" x2="800" y2="408" stroke="#bbb"/>
<rect x="62" y="413" width="760" height="22" rx="6" fill="#fffbe9" stroke="none" stroke-width="1.3" />
<text x="70" y="428" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">0    0    0   |  0          1         |</text>
<text x="500" y="428" font-family="monospace" font-size="11" text-anchor="start" fill="#070" font-weight="normal">YES  &lt;-- D reaches latch</text>
<rect x="62" y="437" width="760" height="22" rx="6" fill="#fffbe9" stroke="none" stroke-width="1.3" />
<text x="70" y="452" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">0    0    1   |  0          1         |</text>
<text x="500" y="452" font-family="monospace" font-size="11" text-anchor="start" fill="#070" font-weight="normal">YES  (same as above)</text>
<text x="70" y="476" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">0    1    0   |  0          0         |</text>
<text x="500" y="476" font-family="monospace" font-size="11" text-anchor="start" fill="#a00" font-weight="normal">no   (SE routes SI, not D)</text>
<text x="70" y="500" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">0    1    1   |  1          1         |</text>
<text x="500" y="500" font-family="monospace" font-size="11" text-anchor="start" fill="#a00" font-weight="normal">no   (SE routes SI, not D)</text>
<text x="70" y="524" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">1    -    -   |  X          X         |</text>
<text x="500" y="524" font-family="monospace" font-size="11" text-anchor="start" fill="#a00" font-weight="normal">no   (latch opaque)</text>
<text x="40" y="556" font-family="monospace" font-size="10" text-anchor="start" fill="#888" font-weight="normal">note: the synthetic twin gives ml_a=D; the REAL cell gives ml_a=NOT D (one inversion).</text>
<text x="40" y="572" font-family="monospace" font-size="10" text-anchor="start" fill="#888" font-weight="normal">P1 only cares whether D CONTROLS (d/dD=1), not the polarity -- so the conclusion is identical.</text>
<rect x="24" y="632" width="832" height="118" rx="6" fill="#fff0f3" stroke="#333" stroke-width="1.3" />
<text x="40" y="654" font-family="monospace" font-size="13" text-anchor="start" fill="#a35" font-weight="bold">STEP 3  Read off the REQUIRED selects</text>
<text x="40" y="678" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">Compare the rows: D controls capture ONLY when SE=0.  Flip SE to 1 and D stops mattering.</text>
<text x="40" y="698" font-family="monospace" font-size="11" text-anchor="start" fill="#060" font-weight="bold">=&gt; SE is a SELECT and its required value is 0  (toggling SE changes whether capture happens).</text>
<text x="40" y="722" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">Also: only CP=0 works -&gt; that is the transparent (master-writing) clock phase.</text>
<rect x="24" y="764" width="832" height="150" rx="6" fill="#fdf0ff" stroke="#333" stroke-width="1.3" />
<text x="40" y="786" font-family="monospace" font-size="13" text-anchor="start" fill="#85c" font-weight="bold">STEP 4  Mask test the remaining pins</text>
<text x="40" y="808" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">Hold the selects (SE=0). For each side pin, toggle it 0-&gt;1 and check the captured value:</text>
<text x="60" y="832" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">under CP=0, SE=0:   D=0:  SI=0 -&gt; ml_a=0   SI=1 -&gt; ml_a=0    SAME</text>
<text x="60" y="850" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">                    D=1:  SI=0 -&gt; ml_a=1   SI=1 -&gt; ml_a=1    SAME</text>
<text x="40" y="876" font-family="monospace" font-size="11" text-anchor="start" fill="#060" font-weight="bold">=&gt; SI never changes capture = MASKED.  Its static value is non-critical (golden uses SI=1).</text>
<text x="40" y="896" font-family="monospace" font-size="11" text-anchor="start" fill="#555" font-weight="normal">This is exactly d(capture)/d(SI) = 0 -- the scan path is proven OFF.</text>
<rect x="24" y="928" width="832" height="96" rx="6" fill="#ffe6cc" stroke="#333" stroke-width="1.3" />
<text x="40" y="956" font-family="monospace" font-size="14" text-anchor="start" fill="#960" font-weight="bold">RESULT:  SE=0 (required select)   +   SI masked   =&gt;   P1 = PASS (proven)</text>
<text x="40" y="982" font-family="monospace" font-size="11" text-anchor="start" fill="#111" font-weight="normal">d(master)/d(D)=1 under SE=0, and d(master)/d(SI)=0.  The D path is live, the scan path is masked.</text>
<text x="40" y="1002" font-family="monospace" font-size="11" text-anchor="start" fill="#555" font-weight="normal">Cross-check vs arc.when (notSE_SI -&gt; SE=0,SI=1):  AGREE.  Same as golden, but DERIVED + PROVEN.</text>
<rect x="24" y="1038" width="832" height="250" rx="6" fill="#eef3ff" stroke="#333" stroke-width="1.3" />
<text x="40" y="1062" font-family="monospace" font-size="13" text-anchor="start" fill="#258" font-weight="bold">The single idea -- Boolean difference</text>
<text x="40" y="1086" font-family="monospace" font-size="11" text-anchor="start" fill="#123" font-weight="normal">d(out)/d(in):  evaluate the circuit with in=0 and in=1.  If out differs, in CONTROLS out.</text>
<text x="40" y="1106" font-family="monospace" font-size="11" text-anchor="start" fill="#123" font-weight="normal"></text>
<text x="40" y="1126" font-family="monospace" font-size="11" text-anchor="start" fill="#123" font-weight="normal">  - applied to D  -&gt; proves the MEASURED path is live   (we WANT d/dD = 1)</text>
<text x="40" y="1146" font-family="monospace" font-size="11" text-anchor="start" fill="#123" font-weight="normal">  - applied to SI -&gt; proves the COMPETING path is off   (we WANT d/dSI = 0)</text>
<text x="40" y="1166" font-family="monospace" font-size="11" text-anchor="start" fill="#123" font-weight="normal"></text>
<text x="40" y="1186" font-family="monospace" font-size="11" text-anchor="start" fill="#123" font-weight="normal">Why enumeration is fine (not z3): the side pins are few (SE, SI) and the clock has 2 phases,</text>
<text x="40" y="1206" font-family="monospace" font-size="11" text-anchor="start" fill="#123" font-weight="normal">so we try every combination exhaustively. Exact, deterministic, and you can read every row.</text>
<text x="40" y="1226" font-family="monospace" font-size="11" text-anchor="start" fill="#123" font-weight="normal"></text>
<text x="40" y="1246" font-family="monospace" font-size="11" text-anchor="start" fill="#123" font-weight="normal">This is the same d/d(in) idea P2 uses later in SIMULATION (toggle D, watch the silicon):</text>
<text x="40" y="1266" font-family="monospace" font-size="11" text-anchor="start" fill="#123" font-weight="normal">P1 proves it in LOGIC before the deck is built; P2 confirms it in SILICON after.</text>
</svg>