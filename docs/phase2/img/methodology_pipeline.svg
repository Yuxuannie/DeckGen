<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760">
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#555"/></marker></defs>
<rect width="1180" height="760" fill="white"/>
<text x="20" y="34" font-family="monospace" font-size="18" text-anchor="start" fill="#111" font-weight="bold">DeckGen v2 -- Methodology on real cell SDFQSXG... arc=hold(CP,D)</text>
<text x="20" y="56" font-family="monospace" font-size="13" text-anchor="start" fill="#a00" font-weight="normal">name-blind, fully automatic.  NO z3 / NO SAT solver -- a stdlib switch-level Boolean evaluator.</text>
<rect x="20" y="80" width="224" height="640" rx="6" fill="#cde7ff" stroke="#333" stroke-width="1.5"/>
<text x="30" y="104" font-family="monospace" font-size="13" text-anchor="start" fill="#111" font-weight="bold">S0  PARSE + DE-PARASITIC</text>
<text x="30" y="126" font-family="monospace" font-size="10" text-anchor="start" fill="#555" font-weight="normal">input: LPE netlist (post-layout)</text>
<text x="30" y="152" font-family="monospace" font-size="11" text-anchor="start" fill="#225" font-weight="bold">WHAT it reads:</text>
<text x="34" y="170" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">34 transistors X&lt;n&gt; d g s b</text>
<text x="34" y="185" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">226 parasitic R, many C</text>
<text x="34" y="200" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">nodes: XMSA2#d (private)</text>
<text x="30" y="225" font-family="monospace" font-size="11" text-anchor="start" fill="#225" font-weight="bold">HOW (the method):</text>
<text x="34" y="243" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">short every R (union-find)</text>
<text x="34" y="258" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">drop C (no DC connectivity)</text>
<text x="34" y="273" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">name cluster by its port</text>
<rect x="28" y="292" width="208" height="48" rx="6" fill="#ffffff" stroke="#aaa" stroke-width="1.5"/>
<text x="32" y="308" font-family="monospace" font-size="11" text-anchor="start" fill="#070" font-weight="bold">RESULT:</text>
<text x="34" y="324" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">181 raw nodes -&gt; 28 logical nets</text>
<text x="34" y="339" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">bridges = 0  (self-check)</text>
<line x1="244" y1="400" x2="254" y2="400" stroke="#777" stroke-width="2" marker-end="url(#ar)"/>
<rect x="254" y="80" width="224" height="640" rx="6" fill="#d6f5d6" stroke="#333" stroke-width="1.5"/>
<text x="264" y="104" font-family="monospace" font-size="13" text-anchor="start" fill="#111" font-weight="bold">S1  CCC + STORAGE (Bryant)</text>
<text x="264" y="126" font-family="monospace" font-size="10" text-anchor="start" fill="#555" font-weight="normal">input: 28 logical nets</text>
<text x="264" y="152" font-family="monospace" font-size="11" text-anchor="start" fill="#225" font-weight="bold">WHAT it reads:</text>
<text x="268" y="170" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">channel graph (src-drain,</text>
<text x="268" y="185" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">   gates excluded)</text>
<text x="268" y="200" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">influence graph g/s -&gt; d</text>
<text x="264" y="225" font-family="monospace" font-size="11" text-anchor="start" fill="#225" font-weight="bold">HOW (the method):</text>
<text x="268" y="243" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">Tarjan SCC size&gt;=2</text>
<text x="268" y="258" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">   = cross-coupled feedback</text>
<text x="268" y="273" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">keep SCC members that are</text>
<text x="268" y="288" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">   also gates (drop stacks)</text>
<text x="268" y="303" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">rank by dist to output Q</text>
<rect x="262" y="322" width="208" height="63" rx="6" fill="#ffffff" stroke="#aaa" stroke-width="1.5"/>
<text x="266" y="338" font-family="monospace" font-size="11" text-anchor="start" fill="#070" font-weight="bold">RESULT:</text>
<text x="268" y="354" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">master {ml_ax, ml_b}</text>
<text x="268" y="369" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">slave  {sl_a, sl_bx}</text>
<text x="268" y="384" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">(matched ml_*/sl_* names!)</text>
<line x1="478" y1="400" x2="488" y2="400" stroke="#777" stroke-width="2" marker-end="url(#ar)"/>
<rect x="488" y="80" width="224" height="640" rx="6" fill="#ffe6cc" stroke="#333" stroke-width="1.5"/>
<text x="498" y="104" font-family="monospace" font-size="13" text-anchor="start" fill="#111" font-weight="bold">S2  SENSITIZE -&gt; P1 PROOF</text>
<text x="498" y="126" font-family="monospace" font-size="10" text-anchor="start" fill="#555" font-weight="normal">input: graph + arc</text>
<text x="498" y="152" font-family="monospace" font-size="11" text-anchor="start" fill="#225" font-weight="bold">WHAT it reads:</text>
<text x="502" y="170" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">switch-level eval:</text>
<text x="502" y="185" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">   conduct to rails,</text>
<text x="502" y="200" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">   fixed-point</text>
<text x="502" y="215" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">break latch feedback</text>
<text x="498" y="240" font-family="monospace" font-size="11" text-anchor="start" fill="#225" font-weight="bold">HOW (the method):</text>
<text x="502" y="258" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">Boolean difference:</text>
<text x="502" y="273" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">   d(master)/d(D) = 1 ?</text>
<text x="502" y="288" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">   under each side bias</text>
<text x="502" y="303" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">classify pins: set vs masked</text>
<rect x="496" y="322" width="208" height="63" rx="6" fill="#ffffff" stroke="#aaa" stroke-width="1.5"/>
<text x="500" y="338" font-family="monospace" font-size="11" text-anchor="start" fill="#070" font-weight="bold">RESULT:</text>
<text x="502" y="354" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">SE=0 (select), SI masked</text>
<text x="502" y="369" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">P1 = PASS (proven)</text>
<text x="502" y="384" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">= golden, but derived</text>
<line x1="712" y1="400" x2="722" y2="400" stroke="#777" stroke-width="2" marker-end="url(#ar)"/>
<rect x="722" y="80" width="224" height="640" rx="6" fill="#f0d6ff" stroke="#333" stroke-width="1.5"/>
<text x="732" y="104" font-family="monospace" font-size="13" text-anchor="start" fill="#111" font-weight="bold">S3  INITIALIZE</text>
<text x="732" y="126" font-family="monospace" font-size="10" text-anchor="start" fill="#555" font-weight="normal">input: CCC + arc + P1 bias</text>
<text x="732" y="152" font-family="monospace" font-size="11" text-anchor="start" fill="#225" font-weight="bold">WHAT it reads:</text>
<text x="736" y="170" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">hold conv: D=1 pre-edge</text>
<text x="736" y="185" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">eval master (transparent,</text>
<text x="736" y="200" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">   D=1, feedback broken)</text>
<text x="736" y="215" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">slave = holds prior</text>
<text x="732" y="240" font-family="monospace" font-size="11" text-anchor="start" fill="#225" font-weight="bold">HOW (the method):</text>
<text x="736" y="258" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">master written node value</text>
<text x="736" y="273" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">   (real: ml_ax=0, inverted!)</text>
<text x="736" y="288" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">probes = real x1.&lt;net#k&gt;</text>
<text x="736" y="303" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">pre-cycle plan</text>
<rect x="730" y="322" width="208" height="63" rx="6" fill="#ffffff" stroke="#aaa" stroke-width="1.5"/>
<text x="734" y="338" font-family="monospace" font-size="11" text-anchor="start" fill="#070" font-weight="bold">RESULT:</text>
<text x="736" y="354" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">required init state</text>
<text x="736" y="369" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">   + drive-and-settle</text>
<text x="736" y="384" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">(slave polarity -&gt; P2)</text>
<line x1="946" y1="400" x2="956" y2="400" stroke="#777" stroke-width="2" marker-end="url(#ar)"/>
<rect x="956" y="80" width="224" height="640" rx="6" fill="#ffd6e0" stroke="#333" stroke-width="1.5"/>
<text x="966" y="104" font-family="monospace" font-size="13" text-anchor="start" fill="#111" font-weight="bold">P2  SIMULATE + VERIFY</text>
<text x="966" y="126" font-family="monospace" font-size="10" text-anchor="start" fill="#555" font-weight="normal">input: deck -&gt; hspice -&gt; .mt0</text>
<text x="966" y="152" font-family="monospace" font-size="11" text-anchor="start" fill="#225" font-weight="bold">WHAT it reads:</text>
<text x="970" y="170" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">run deck TWICE:</text>
<text x="970" y="185" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">   D=1 and D=0</text>
<text x="970" y="200" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">same pre-cycle</text>
<text x="970" y="215" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">probe storage @ settle</text>
<text x="966" y="240" font-family="monospace" font-size="11" text-anchor="start" fill="#225" font-weight="bold">HOW (the method):</text>
<text x="970" y="258" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">master must FOLLOW D</text>
<text x="970" y="273" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">slave must NOT follow</text>
<text x="970" y="288" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">clean rails (not X)</text>
<text x="970" y="303" font-family="monospace" font-size="10" text-anchor="start" fill="#111" font-weight="normal">pairs complementary</text>
<rect x="964" y="322" width="208" height="63" rx="6" fill="#ffffff" stroke="#aaa" stroke-width="1.5"/>
<text x="968" y="338" font-family="monospace" font-size="11" text-anchor="start" fill="#070" font-weight="bold">RESULT:</text>
<text x="970" y="354" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">P2 = PASS on real silicon</text>
<text x="970" y="369" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">master tracks, slave holds</text>
<text x="970" y="384" font-family="monospace" font-size="10" text-anchor="start" fill="#060" font-weight="normal">(what MCQC cannot prove)</text>
</svg>