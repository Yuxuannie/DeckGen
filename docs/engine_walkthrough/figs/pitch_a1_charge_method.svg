fill='#E7DEF4' stroke='none' stroke-width='1'/><text x='576.0' y='168' font-size='13' text-anchor='middle' fill='#5B3E8E' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>2  contract</text><text x='576.0' y='200' font-size='11.5' text-anchor='middle' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>ON-connected nets -&gt;</text><text x='576.0' y='219' font-size='11.5' text-anchor='middle' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>one super-node carrying</text><text x='576.0' y='238' font-size='11.5' text-anchor='middle' fill='#3C3654' font-weight='normal' font-family='Courier New, monospace'>Q = SUM Cg * Ventry</text><line x1='736' y1='204' x2='776' y2='204' stroke='#5B3E8E' stroke-width='2'/><polygon points='776.0,204.0 766.0,209.0 766.0,199.0' fill='#5B3E8E'/><rect x='776' y='150' width='320' height='108' rx='10' fill='#F6F2FB' stroke='#5B3E8E' stroke-width='1'/><rect x='776' y='150' width='320' height='26' rx='10' fill='#E7DEF4' stroke='#5B3E8E' stroke-width='1'/><rect x='776' y='166' width='320' height='10' rx='0' fill='#E7DEF4' stroke='none' stroke-width='1'/><text x='936.0' y='168' font-size='13' text-anchor='middle' fill='#5B3E8E' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>3  coupling matrix</text><text x='936.0' y='200' font-size='11.5' text-anchor='middle' fill='#3C3654' font-weight='normal' font-family='Courier New, monospace'>Cc stamps A.V = b ;</text><text x='936.0' y='219' font-size='11.5' text-anchor='middle' fill='#3C3654' font-weight='normal' font-family='Courier New, monospace'>fixed (held) nodes</text><text x='936.0' y='238' font-size='11.5' text-anchor='middle' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>inject into the RHS</text><line x1='1096' y1='204' x2='1136' y2='204' stroke='#5B3E8E' stroke-width='2'/><polygon points='1136.0,204.0 1126.0,209.0 1126.0,199.0' fill='#5B3E8E'/><rect x='1136' y='150' width='320' height='108' rx='10' fill='#F6F2FB' stroke='#7E5BB5' stroke-width='1'/><rect x='1136' y='150' width='320' height='26' rx='10' fill='#E7DEF4' stroke='#7E5BB5' stroke-width='1'/><rect x='1136' y='166' width='320' height='10' rx='0' fill='#E7DEF4' stroke='none' stroke-width='1'/><text x='1296.0' y='168' font-size='13' text-anchor='middle' fill='#7E5BB5' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>4  solve</text><text x='1296.0' y='200' font-size='11.5' text-anchor='middle' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>dense Gaussian solve</text><text x='1296.0' y='219' font-size='11.5' text-anchor='middle' fill='#3C3654' font-weight='normal' font-family='Courier New, monospace'>-&gt; V (model voltage)</text><text x='1296.0' y='238' font-size='11.5' text-anchor='middle' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'></text><line x1='1296.0' y1='258' x2='1296.0' y2='300' stroke='#5B3E8E' stroke-width='2'/><polygon points='1296.0,300.0 1291.0,290.0 1301.0,290.0' fill='#5B3E8E'/><rect x='1136' y='300' width='320' height='40' rx='8' fill='#FFF8E8' stroke='#B8860B' stroke-width='1'/><text x='1296.0' y='318' font-size='12' text-anchor='middle' fill='#8a6d00' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>singular: no rail reference</text><text x='1296.0' y='334' font-size='11.5' text-anchor='middle' fill='#3C3654' font-weight='normal' font-family='Courier New, monospace'>-&gt; X (not a fabricated value)</text><text x='56' y='400' font-size='18' text-anchor='start' fill='#211C30' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Three SPICE-free invariants (each ends PASS / FAIL)</text><rect x='56' y='430' width='1424' height='56' rx='8' fill='#F6F2FB' stroke='#D7CFE8' stroke-width='1'/><rect x='72' y='448' width='64' height='20' rx='10' fill='white' stroke='#2E8B57' stroke-width='1'/><text x='104.0' y='462' font-size='11' text-anchor='middle' fill='#2E8B57' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>PASS</text><text x='150' y='454' font-size='14' text-anchor='start' fill='#5B3E8E' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>residual</text><text x='150' y='474' font-size='12.5' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>the solver solved its own system: ||A.V - b|| ~ 0</text><rect x='56' y='496' width='1424' height='56' rx='8' fill='#F6F2FB' stroke='#D7CFE8' stroke-width='1'/><rect x='72' y='514' width='64' height='20' rx='10' fill='white' stroke='#2E8B57' stroke-width='1'/><text x='104.0' y='528' font-size='11' text-anchor='middle' fill='#2E8B57' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>PASS</text><text x='150' y='520' font-size='14' text-anchor='start' fill='#5B3E8E' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>convex-hull bound</text><text x='150' y='540' font-size='12.5' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>every resolved V lies within the boundary potentials (a cap M-matrix average) -- outside = a bug</text><rect x='56' y='562' width='1424' height='56' rx='8' fill='#F6F2FB' stroke='#D7CFE8' stroke-width='1'/><rect x='72' y='580' width='64' height='20' rx='10' fill='white' stroke='#2E8B57' stroke-width='1'/><text x='104.0' y='594' font-size='11' text-anchor='middle' fill='#2E8B57' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>PASS</text><text x='150' y='586' font-size='14' text-anchor='start' fill='#5B3E8E' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>scalar cross-check</text><text x='150' y='606' font-size='12.5' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>an uncoupled super-node equals the closed-form charge-share V</text><rect x='56' y='700' width='1424' height='44' rx='8' fill='#FFF8E8' stroke='#B8860B' stroke-width='1'/><text x='72' y='719' font-size='13' text-anchor='start' fill='#8a6d00' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>all voltages are MODEL predictions, UNVERIFIED vs SPICE.</text><text x='72' y='736' font-size='12.5' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>this resolve feeds the eventual P3; a node with no rail reference resolves to X, not a guessed value.</text><text x='56' y='836' font-size='12.5' text-anchor='start' fill='#8A82A0' font-weight='normal' font-family='Courier New, monospace'>source: engine/charge.py (Pillar 3) -- resolve_checked(); render engine/charge_svg.py</text></svg>