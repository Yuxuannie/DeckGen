ht='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>CD</text><line x1='315.0' y1='238' x2='315.0' y2='304' stroke='#dc2626' stroke-width='1.1' stroke-dasharray='3,3'/><line x1='659.0' y1='238' x2='659.0' y2='304' stroke='#dc2626' stroke-width='1.1' stroke-dasharray='3,3'/><line x1='1003.0' y1='238' x2='1003.0' y2='304' stroke='#dc2626' stroke-width='1.1' stroke-dasharray='3,3'/><line x1='1347.0' y1='238' x2='1347.0' y2='304' stroke='#dc2626' stroke-width='1.1' stroke-dasharray='3,3'/><text x='1066' y='326' font-size='12' text-anchor='start' fill='#dc2626' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>CD (async clear) couples into the slave latches -- the '_cx' member node</text><line x1='64' y1='344' x2='1426' y2='344' stroke='#d97706' stroke-width='2.2'/><text x='20' y='349' font-size='14' text-anchor='start' fill='#d97706' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>CP</text><text x='70' y='336' font-size='12' text-anchor='start' fill='#d97706' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>CP gates all 8 latches</text><text x='40' y='384' font-size='13' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>method (name-blind):</text><text x='40' y='406' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>1  channel CCC -> 39 groups</text><text x='400' y='406' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>2  influence graph: gate, source -> drain</text><text x='760' y='406' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>3  SCC with >= 2 gate members -> 8 latches</text><text x='1120' y='406' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>4  rank by influence-distance to Q</text><rect x='40' y='424' width='1440' height='58' rx='10' fill='#ecfdf5' stroke='#a7f3d0' stroke-width='1'/><text x='58' y='447' font-size='13.5' text-anchor='start' fill='#065f46' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Read it right:</text><text x='165' y='447' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>8 latches = 4 flip-flops (master + slave each). 'stage1..6' are distance-RANK labels, NOT six synchronizer stages.</text><text x='58' y='468' font-size='12.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>master half carries an _a/_b pair; slave half carries an _a/_cx pair (the CD clear path). Pairing the 8 into FF1..FF4 is a planned refinement.</text></svg>