<svg xmlns='http://www.w3.org/2000/svg' width='1536' height='864' viewBox='0 0 1536 864'><rect width='1536' height='864' fill='white'/><text x='56' y='56' font-size='28' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Applications these outputs grow into -- the roadmap</text><text x='56' y='86' font-size='15' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>all forward-looking; the engine has the capability base, the applications are co-built with your team</text><line x1='56' y1='102' x2='1480' y2='102' stroke='#e5e7eb' stroke-width='1.5'/><rect x='56' y='150' width='1424' height='104' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><rect x='56' y='150' width='5' height='104' rx='0' fill='#d97706' stroke='none' stroke-width='1'/><text x='76' y='180' font-size='16' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Worst-case initialization</text><rect x='1350' y='165' width='116' height='20' rx='10' fill='white' stroke='#d97706' stroke-width='1'/><text x='1408.0' y='179' font-size='11' text-anchor='middle' fill='#d97706' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>HYPOTHESIS</text><text x='76' y='206' font-size='13' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>the resolved internal voltage is exactly what a correct worst-case initialization must reflect; feeding the charge resolve into a worst-case-init query is the bridge</text><text x='76' y='230' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>today: S3 sync init is still a {None} placeholder -- not done</text><rect x='56' y='272' width='1424' height='104' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><rect x='56' y='272' width='5' height='104' rx='0' fill='#d97706' stroke='none' stroke-width='1'/><text x='76' y='302' font-size='16' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>AIQC feature</text><rect x='1350' y='287' width='116' height='20' rx='10' fill='white' stroke='#d97706' stroke-width='1'/><text x='1408.0' y='301' font-size='11' text-anchor='middle' fill='#d97706' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>DIRECTION</text><text x='76' y='328' font-size='13' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>topology + charge as features for topology-aware sampling -- a structural upgrade to MLQC's sampling</text><text x='76' y='352' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>direction, not built</text><rect x='56' y='394' width='1424' height='104' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><rect x='56' y='394' width='5' height='104' rx='0' fill='#d97706' stroke='none' stroke-width='1'/><text x='76' y='424' font-size='16' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Reverse-engineering from LPE</text><rect x='1350' y='409' width='116' height='20' rx='10' fill='white' stroke='#d97706' stroke-width='1'/><text x='1408.0' y='423' font-size='11' text-anchor='middle' fill='#d97706' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>DIRECTION</text><text x='76' y='450' font-size='13' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>CCC + charge recover a cell's behaviour from its LPE structure alone, naming-independent -- a cell the team did not document becomes legible</text><text x='76' y='474' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>direction, not built</text><rect x='56' y='560' width='1424' height='150' rx='12' fill='#eff6ff' stroke='#2563eb' stroke-width='1'/><text x='80' y='600' font-size='16' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>The ask</text><text x='80' y='634' font-size='16' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>The engine has the capability base. Which application we build next -- and how -- depends on the problems your team most wants solved.</text><text x='80' y='664' font-size='15' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>The flows are co-built, with your team as the owner of what matters; that is the conversation we want to have.</text><text x='56' y='838' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>capability base today: engine/charge.py (Pillar 3) + structure S0-S2; applications above are forward-looking.</text></svg>