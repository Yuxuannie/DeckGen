<svg xmlns='http://www.w3.org/2000/svg' width='1500' height='600' viewBox='0 0 1500 600'><defs><marker id='arrow' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6 Z' fill='#111827'/></marker></defs><rect width='1500' height='600' fill='white'/><text x='40' y='44' font-size='23' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Stage 1 -- HOW storage is found: channel graph (CCC) + feedback loops (SCC)</text><text x='40' y='70' font-size='14' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>worked on one latch core; the identical procedure runs cell-wide and returns all 8 storage loops</text><rect x='40' y='92' width='540' height='420' rx='12' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='60' y='120' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>1) the latch core (transistor level)</text><circle cx='120' cy='215' r='17' fill='white' stroke='#111827' stroke-width='2'/><text x='120' y='220' font-size='13' text-anchor='middle' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Din</text><line x1='137' y1='215' x2='178' y2='215' stroke='#111827' stroke-width='2'/><rect x='178' y='200' width='52' height='30' rx='4' fill='white' stroke='#111827' stroke-width='2'/><text x='204' y='219' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>pass</text><text x='204' y='194' font-size='11' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>g=CK</text><line x1='230' y1='215' x2='283' y2='215' stroke='#111827' stroke-width='2'/><circle cx='300' cy='215' r='17' fill='white' stroke='#2563eb' stroke-width='2'/><text x='300' y='220' font-size='13' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>A</text><circle cx='470' cy='215' r='17' fill='white' stroke='#2563eb' stroke-width='2'/><text x='470' y='220' font-size='13' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>B</text><line x1='317' y1='215' x2='332' y2='215' stroke='#111827' stroke-width='2'/><polygon points='332,201 332,229 360,215' fill='white' stroke='#111827' stroke-width='2'/><circle cx='365' cy='215' r='5' fill='white' stroke='#111827' stroke-width='2'/><line x1='370' y1='215' x2='453' y2='215' stroke='#111827' stroke-width='2'/><line x1='470' y1='232' x2='470' y2='330' stroke='#111827' stroke-width='2'/><polygon points='458,316 458,344 430,330' fill='white' stroke='#111827' stroke-width='2'/><circle cx='425' cy='330' r='5' fill='white' stroke='#111827' stroke-width='2'/><line x1='458' y1='330' x2='470' y2='330' stroke='#111827' stroke-width='2'/><line x1='420' y1='330' x2='300' y2='330' stroke='#111827' stroke-width='2'/><line x1='300' y1='330' x2='300' y2='232' stroke='#111827' stroke-width='2'/><text x='300' y='372' font-size='11' text-anchor='middle' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>bit a</text><text x='470' y='372' font-size='11' text-anchor='middle' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>bit b</text><text x='60' y='432' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>two inverters back-to-back = a feedback loop;</text><text x='60' y='450' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>the pass-gate loads it under clock CK</text><text x='60' y='480' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>channel graph (source-drain) partitions nets -> 39 CCCs;</text><text x='60' y='497' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>rails and primary inputs are boundaries</text><rect x='600' y='92' width='440' height='420' rx='12' fill='#f1f5f9' stroke='#e5e7eb' stroke-width='1'/><text x='620' y='120' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>2) influence digraph</text><text x='620' y='142' font-size='12.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>one edge per transistor:  gate -> drain,  source -> drain</text><line x1='705.5536026267398' y1='221.861883511797' x2='844.4463973732602' y2='283.138116488203' stroke='#111827' stroke-width='2'/><polygon points='844.4,283.1 833.3,283.7 837.3,274.5' fill='#111827'/><line x1='705.7195276740702' y1='353.527253310677' x2='844.2804723259298' y2='296.472746689323' stroke='#111827' stroke-width='2'/><polygon points='844.3,296.5 836.9,304.9 833.1,295.7' fill='#111827'/><path d='M877,283 Q922.5,249.0 968,283' fill='none' stroke='#dc2626' stroke-width='2'/><polygon points='968.0,283.0 957.0,281.0 963.0,273.0' fill='#dc2626'/><path d='M968,297 Q922.5,331.0 877,297' fill='none' stroke='#dc2626' stroke-width='2'/><polygon points='877.0,297.0 888.0,299.0 882.0,307.0' fill='#dc2626'/><circle cx='690' cy='215' r='17' fill='white' stroke='#6b7280' stroke-width='2'/><text x='690' y='220' font-size='13' text-anchor='middle' fill='#6b7280' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Din</text><circle cx='690' cy='360' r='17' fill='white' stroke='#6b7280' stroke-width='2'/><text x='690' y='365' font-size='13' text-anchor='middle' fill='#6b7280' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>CK</text><circle cx='860' cy='290' r='17' fill='white' stroke='#2563eb' stroke-width='2'/><text x='860' y='295' font-size='13' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>A</text><circle cx='985' cy='290' r='17' fill='white' stroke='#2563eb' stroke-width='2'/><text x='985' y='295' font-size='13' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>B</text><text x='620' y='415' font-size='13' text-anchor='start' fill='#dc2626' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>red cycle:  A -> B -> A</text><text x='620' y='435' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>(cross-coupled feedback = a bistable)</text><text x='620' y='470' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>an inverter's input net (a gate) drives its</text><text x='620' y='487' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>output net (a drain) -> the two arrows close a loop</text><rect x='1060' y='92' width='400' height='420' rx='12' fill='#eff6ff' stroke='#2563eb' stroke-width='1'/><text x='1080' y='120' font-size='15' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>3) Tarjan SCC + gate filter</text><text x='1080' y='152' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>strongly-connected component found:</text><text x='1080' y='178' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>   {A, B},  size 2</text><text x='1080' y='204' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>keep only loops with >= 2 nets that are</text><text x='1080' y='230' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>   themselves transistor GATES</text><text x='1080' y='256' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>A gates INV1, B gates INV2  -> both kept</text><text x='1080' y='282' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>series-stack drain-only nodes -> dropped</text><rect x='1080' y='322' width='360' height='96' rx='8' fill='white' stroke='#2563eb' stroke-width='1'/><text x='1100' y='352' font-size='15' text-anchor='start' fill='#16a34a' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>=> a BISTABLE storage latch</text><text x='1100' y='378' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>identified from STRUCTURE alone,</text><text x='1100' y='397' font-size='12.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>real nets here: mq_a / mq_b</text><text x='1080' y='470' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>(roles master/slave then come from</text><text x='1080' y='487' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>influence-distance to the output Q)</text><rect x='40' y='528' width='1420' height='50' rx='10' fill='#ecfdf5' stroke='#a7f3d0' stroke-width='1'/><text x='58' y='558' font-size='13.5' text-anchor='start' fill='#065f46' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Run over the whole cell:</text><text x='245' y='558' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>8 such feedback loops found = the 8 latches; ranked by distance to Q they form the master..slave chain (next figure).</text></svg>