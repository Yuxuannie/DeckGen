<svg xmlns='http://www.w3.org/2000/svg' width='1440' height='620' viewBox='0 0 1440 620'><defs><marker id='arrow' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6 Z' fill='#111827'/></marker></defs><rect width='1440' height='620' fill='white'/><text x='40' y='44' font-size='22' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Channel-Connected Components (CCC): group the 92 nets by transistor channels</text><text x='40' y='70' font-size='13.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>input = S0's output: 92 logical nets (82 internal + 10 ports/rails). A transistor's source-drain channel links two nets; the gate does not.</text><rect x='40' y='92' width='410' height='446' rx='12' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='60' y='120' font-size='14.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>1) the linking rule</text><line x1='175' y1='204' x2='175' y2='236' stroke='#111827' stroke-width='3'/><line x1='156' y1='220' x2='175' y2='220' stroke='#111827' stroke-width='2'/><line x1='183' y1='204' x2='183' y2='236' stroke='#16a34a' stroke-width='3'/><line x1='183' y1='204' x2='183' y2='188' stroke='#16a34a' stroke-width='2'/><line x1='183' y1='236' x2='183' y2='252' stroke='#16a34a' stroke-width='2'/><text x='188' y='180' font-size='11' text-anchor='start' fill='#16a34a' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>d (drain)</text><text x='188' y='270' font-size='11' text-anchor='start' fill='#16a34a' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>s (source)</text><text x='110' y='224' font-size='11' text-anchor='end' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>g</text><text x='60' y='320' font-size='12.5' text-anchor='start' fill='#16a34a' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>edge = source-drain channel (green)</text><text x='60' y='340' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>between the drain net and the source net</text><text x='60' y='372' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>gate is EXCLUDED -- it controls, it is not</text><text x='60' y='390' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>part of the conduction path here</text><text x='60' y='424' font-size='12.5' text-anchor='start' fill='#dc2626' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>BOUNDARIES (grouping stops):</text><text x='60' y='444' font-size='12' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>rails VDD/VSS/VPP/VBB and primary</text><text x='60' y='462' font-size='12' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>inputs CD/CP/D/SE/SI -> only the 82</text><text x='60' y='480' font-size='12' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>internal nets get grouped</text><rect x='470' y='92' width='560' height='446' rx='12' fill='#f1f5f9' stroke='#e5e7eb' stroke-width='1'/><text x='490' y='120' font-size='14.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>2) channel graph -> union-find -> components</text><line x1='640' y1='200' x2='760' y2='175' stroke='#2563eb' stroke-width='2'/><line x1='760' y1='175' x2='780' y2='250' stroke='#2563eb' stroke-width='2'/><line x1='780' y1='250' x2='660' y2='270' stroke='#2563eb' stroke-width='2'/><line x1='660' y1='270' x2='640' y2='200' stroke='#2563eb' stroke-width='2'/><circle cx='640' cy='200' r='20' fill='white' stroke='#2563eb' stroke-width='2'/><text x='640' y='204' font-size='10' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mq</text><circle cx='760' cy='175' r='20' fill='white' stroke='#2563eb' stroke-width='2'/><text x='760' y='179' font-size='10' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mq_a</text><circle cx='780' cy='250' r='20' fill='white' stroke='#2563eb' stroke-width='2'/><text x='780' y='254' font-size='10' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mq_b</text><circle cx='660' cy='270' r='20' fill='white' stroke='#2563eb' stroke-width='2'/><text x='660' y='274' font-size='10' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mq_x</text><line x1='640' y1='360' x2='760' y2='360' stroke='#10b981' stroke-width='2'/><circle cx='640' cy='360' r='20' fill='white' stroke='#10b981' stroke-width='2'/><text x='640' y='364' font-size='10' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mi</text><circle cx='760' cy='360' r='20' fill='white' stroke='#10b981' stroke-width='2'/><text x='760' y='364' font-size='10' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>seb</text><line x1='910' y1='200' x2='980' y2='260' stroke='#d97706' stroke-width='2'/><circle cx='910' cy='200' r='20' fill='white' stroke='#d97706' stroke-width='2'/><text x='910' y='204' font-size='10' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>clkb</text><circle cx='980' cy='260' r='20' fill='white' stroke='#d97706' stroke-width='2'/><text x='980' y='264' font-size='10' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>ckx</text><rect x='890' y='350' width='64' height='30' rx='4' fill='#e5e7eb' stroke='#6b7280' stroke-width='1'/><text x='922' y='370' font-size='11' text-anchor='middle' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>VSS</text><text x='922' y='405' font-size='10.5' text-anchor='middle' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>(rail = boundary;</text><text x='922' y='420' font-size='10.5' text-anchor='middle' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>stops the group)</text><text x='490' y='470' font-size='12.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>the SAME union-find as S0, now over source-drain edges</text><text x='490' y='492' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>82 internal nets  ->  </text><text x='620' y='492' font-size='13' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>39 channel-connected components</text><text x='490' y='514' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>(each color above = one CCC)</text><rect x='1050' y='92' width='350' height='446' rx='12' fill='#eff6ff' stroke='#2563eb' stroke-width='1'/><text x='1070' y='120' font-size='14.5' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>3) what one CCC is</text><line x1='1170' y1='200' x2='1270' y2='185' stroke='#2563eb' stroke-width='2'/><line x1='1270' y1='185' x2='1285' y2='260' stroke='#2563eb' stroke-width='2'/><line x1='1285' y1='260' x2='1185' y2='270' stroke='#2563eb' stroke-width='2'/><line x1='1185' y1='270' x2='1170' y2='200' stroke='#2563eb' stroke-width='2'/><circle cx='1170' cy='200' r='21' fill='white' stroke='#2563eb' stroke-width='2'/><text x='1170' y='204' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mq</text><circle cx='1270' cy='185' r='21' fill='white' stroke='#2563eb' stroke-width='2'/><text x='1270' y='189' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mq_a</text><circle cx='1285' cy='260' r='21' fill='white' stroke='#2563eb' stroke-width='2'/><text x='1285' y='264' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mq_b</text><circle cx='1185' cy='270' r='21' fill='white' stroke='#2563eb' stroke-width='2'/><text x='1185' y='274' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mq_x</text><text x='1070' y='330' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>a CCC = nets that share charge</text><text x='1070' y='348' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>through channels (a switch-level</text><text x='1070' y='366' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>node group)</text><text x='1070' y='398' font-size='12.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>39 CCCs total;  8 of them contain</text><text x='1070' y='416' font-size='12.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>a cross-coupled feedback loop</text><text x='1070' y='434' font-size='12.5' text-anchor='start' fill='#16a34a' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>= the 8 latches</text><text x='1070' y='462' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>(the loop is found by SCC inside</text><text x='1070' y='480' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>the CCC -- the S1 process figure)</text><rect x='40' y='554' width='1360' height='48' rx='10' fill='#ecfdf5' stroke='#a7f3d0' stroke-width='1'/><text x='58' y='583' font-size='13.5' text-anchor='start' fill='#065f46' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>CCC (undirected, source-drain) = the partition.</text><text x='530' y='583' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>SCC (directed influence graph) = finds the bistable loop inside a CCC.   39 groups, 8 with storage.</text></svg>