<svg xmlns='http://www.w3.org/2000/svg' width='1440' height='620' viewBox='0 0 1440 620'><defs><marker id='arrow' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6 Z' fill='#111827'/></marker></defs><rect width='1440' height='620' fill='white'/><text x='40' y='44' font-size='22' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Channel-Connected Components (CCC): group the 92 nets by transistor channels</text><text x='40' y='70' font-size='13.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>input = S0's output: 92 logical nets (82 internal + 10 ports/rails). A transistor's source-drain channel links two nets; the gate does not.</text><rect x='40' y='92' width='410' height='446' rx='12' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='60' y='120' font-size='14.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>1) the linking rule</text><line x1='175' y1='204' x2='175' y2='236' stroke='#111827' stroke-width='3'/><line x1='156' y1='220' x2='175' y2='220' stroke='#111827' stroke-width='2'/><line x1='183' y1='204' x2='183' y2='236' stroke='#16a34a' stroke-width='3'/><line x1='183' y1='204' x2='183' y2='188' stroke='#16a34a' stroke-width='2'/><line x1='183' y1='236' x2='183' y2='252' stroke='#16a34a' stroke-width='2'/><text x='188' y='180' font-size='11' text-anchor='start' fill='#16a34a' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>d (drain)</text><text x='188' y='270' font-size='11' text-anchor='start' fill='#16a34a' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>s (source)</text><text x='110' y='224' font-size='11' text-anchor='end' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>g</text><text x='60' y='320' font-size='12.5' text-anchor='start' fill='#16a34a' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>edge = source-drain channel (green)</text><text x='60' y='340' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>between the drain net and the source net</text><text x='60' y='372' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>gate is EXCLUDED -- it controls, it is not</text><text x='60' y='390' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>part of the conduction path here</text><text x='60' y='424' font-size='12.5' text-anchor='start' fill='#dc2626' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>BOUNDARIES (grouping stops):</text><text x='60' y='444' font-size='12' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>rails VDD/VSS/VPP/VBB and primary</text><text x='60' y='462' font-size='12' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>inputs CD/CP/D/SE/SI -> only the 82</text><text x='60' y='480' font-size='12' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>internal nets get grouped</text><rect x='470' y='92' width='560' height='446' rx='12' fill='#f1f5f9' stroke='#e5e7eb' stroke-width='1'/><text x='490' y='120' font-size='14.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>2) channel graph -> union-find -> components</text><line x1='610' y1='180' x2='740' y2='175' stroke='#2563eb' stroke-width='2.5'/><circle cx='610' cy='180' r='22' fill='white' stroke='#2563eb' stroke-width='2.5'/><text x='610' y='184' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mi</text><circle cx='740' cy='175' r='22' fill='white' stroke='#2563eb' stroke-width='2.5'/><text x='740' y='179' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>ml_a</text><line x1='620' y1='290' x2='760' y2='300' stroke='#10b981' stroke-width='2.5'/><circle cx='620' cy='290' r='22' fill='white' stroke='#10b981' stroke-width='2.5'/><text x='620' y='294' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>ml_b</text><circle cx='760' cy='300' r='22' fill='white' stroke='#10b981' stroke-width='2.5'/><text x='760' y='304' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>sl_a</text><circle cx='920' cy='175' r='22' fill='white' stroke='#dc2626' stroke-width='2'/><text x='920' y='179' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Q</text><circle cx='920' cy='250' r='22' fill='white' stroke='#d97706' stroke-width='2'/><text x='920' y='254' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>clkb</text><circle cx='920' cy='320' r='22' fill='white' stroke='#6b7280' stroke-width='2'/><text x='920' y='324' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>seb</text><text x='490' y='372' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>each colored group = one CCC (a singleton is a CCC too).</text><text x='490' y='392' font-size='12' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>note: the {ml_b, sl_a} CCC mixes nets from the MASTER and</text><text x='490' y='410' font-size='12' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>the SLAVE latch -- CCCs cut across latch boundaries.</text><text x='490' y='442' font-size='12.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>the SAME union-find as S0, now over source-drain edges:</text><text x='490' y='466' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>82 internal nets  ->  </text><text x='620' y='466' font-size='13' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>39 channel-connected components</text><text x='490' y='492' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>(many are singletons; rails/inputs are boundaries)</text><rect x='1050' y='92' width='350' height='446' rx='12' fill='#fef2f2' stroke='#fecaca' stroke-width='1'/><text x='1070' y='120' font-size='14.5' text-anchor='start' fill='#dc2626' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>3) a CCC is NOT a latch</text><path d='M1147,193 Q1225.0,167.0 1303,193' fill='none' stroke='#111827' stroke-width='2'/><polygon points='1303.0,193.0 1291.9,194.6 1295.1,185.1' fill='#111827'/><path d='M1303,207 Q1225.0,233.0 1147,207' fill='none' stroke='#111827' stroke-width='2'/><polygon points='1147.0,207.0 1158.1,205.4 1154.9,214.9' fill='#111827'/><circle cx='1130' cy='200' r='24' fill='white' stroke='#2563eb' stroke-width='2.5'/><text x='1130' y='204' font-size='11' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>ml_a</text><circle cx='1320' cy='200' r='24' fill='white' stroke='#10b981' stroke-width='2.5'/><text x='1320' y='204' font-size='11' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>ml_b</text><text x='1130' y='245' font-size='10.5' text-anchor='middle' fill='#2563eb' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>in CCC[2]</text><text x='1320' y='245' font-size='10.5' text-anchor='middle' fill='#10b981' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>in CCC[3]</text><text x='1225' y='175' font-size='10.5' text-anchor='middle' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>gate coupling</text><text x='1070' y='290' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>the master latch = one feedback LOOP;</text><text x='1070' y='308' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>its two storage nodes ml_a, ml_b sit in</text><text x='1070' y='326' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>DIFFERENT CCCs -- the cross-coupling is</text><text x='1070' y='344' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>through GATES, not channels.</text><text x='1070' y='378' font-size='12.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>=> CCC != latch. Storage is found by</text><text x='1070' y='396' font-size='12.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>SCC on the influence graph (next fig),</text><text x='1070' y='414' font-size='12.5' text-anchor='start' fill='#dc2626' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>and a loop SPANS several CCCs.</text><text x='1070' y='446' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>CCC is the engine's channel-level</text><text x='1070' y='464' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>decomposition; it is reported as</text><text x='1070' y='482' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>context, not used to find latches.</text><rect x='40' y='554' width='1360' height='48' rx='10' fill='#ecfdf5' stroke='#a7f3d0' stroke-width='1'/><text x='58' y='583' font-size='13.5' text-anchor='start' fill='#065f46' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Two independent views:</text><text x='245' y='583' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>CCC (source-drain channels) = a charge-sharing partition;  SCC (gate-based feedback) = the 8 latches. A latch's nodes span multiple CCCs.</text></svg>