ariance gate</text><rect x='56' y='278' width='1424' height='96' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><rect x='56' y='278' width='5' height='96' rx='0' fill='#16a34a' stroke='none' stroke-width='1'/><text x='76' y='308' font-size='16' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Charge resolve</text><rect x='1350' y='293' width='116' height='20' rx='10' fill='white' stroke='#16a34a' stroke-width='1'/><text x='1408.0' y='307' font-size='11' text-anchor='middle' fill='#16a34a' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>BUILT</text><text x='76' y='334' font-size='13' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>floating internal-node voltage by charge conservation (Cg/Cc), checked by 3 SPICE-free invariants</text><text x='76' y='358' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>engine/charge.py (Pillar 3)  +  tests</text><rect x='56' y='388' width='1424' height='96' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><rect x='56' y='388' width='5' height='96' rx='0' fill='#16a34a' stroke='none' stroke-width='1'/><text x='76' y='418' font-size='16' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Coupling in the resolve</text><rect x='1350' y='403' width='116' height='20' rx='10' fill='white' stroke='#16a34a' stroke-width='1'/><text x='1408.0' y='417' font-size='11' text-anchor='middle' fill='#16a34a' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>BUILT</text><text x='76' y='444' font-size='13' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>a held aggressor's coupling already enters the resolve -- the divider case, no separate layer needed</text><text x='76' y='468' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>engine/charge.py : resolve()</text><rect x='56' y='498' width='1424' height='96' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><rect x='56' y='498' width='5' height='96' rx='0' fill='#2563eb' stroke='none' stroke-width='1'/><text x='76' y='528' font-size='16' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Aggressor / victim impact</text><rect x='1350' y='513' width='116' height='20' rx='10' fill='white' stroke='#2563eb' stroke-width='1'/><text x='1408.0' y='527' font-size='11' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>NEXT</text><text x='76' y='554' font-size='13' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>the coupling data (Cc) is already in hand; a dedicated impact-analysis layer is the next step (not built)</text><text x='76' y='578' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>(layer not built)</text><rect x='56' y='608' width='1424' height='96' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><rect x='56' y='608' width='5' height='96' rx='0' fill='#d97706' stroke='none' stroke-width='1'/><text x='76' y='638' font-size='16' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Cell fingerprint from LPE</text><rect x='1350' y='623' width='116' height='20' rx='10' fill='white' stroke='#d97706' stroke-width='1'/><text x='1408.0' y='637' font-size='11' text-anchor='middle' fill='#d97706' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>ROADMAP</text><text x='76' y='664' font-size='13' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>today's fingerprint is TEMPLATE-level (22 fingerprints -&gt; 5 families / 63 templates); a cell-level LPE fingerprint is ahead</text><text x='76' y='688' font