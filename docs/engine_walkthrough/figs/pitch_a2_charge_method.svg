<svg xmlns='http://www.w3.org/2000/svg' width='1536' height='864' viewBox='0 0 1536 864'><rect width='1536' height='864' fill='white'/><text x='56' y='56' font-size='28' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Charge-conservation resolve -- the method</text><text x='56' y='86' font-size='15' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>SPICE-free: contract, stamp a capacitance matrix, solve; a singular island resolves to X</text><line x1='56' y1='102' x2='1480' y2='102' stroke='#e5e7eb' stroke-width='1.5'/><rect x='56' y='142' width='320' height='104' rx='10' fill='#f9fafb' stroke='#2563eb' stroke-width='1'/><rect x='56' y='142' width='320' height='26' rx='10' fill='#eff6ff' stroke='#2563eb' stroke-width='1'/><rect x='56' y='158' width='320' height='10' rx='0' fill='#eff6ff' stroke='none' stroke-width='1'/><text x='216.0' y='160' font-size='13' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>1  cap_network</text><text x='216.0' y='192' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Courier New, monospace'>graph.caps (LPE) -&gt;</text><text x='216.0' y='211' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Courier New, monospace'>Cg grounded, Cc coupling</text><text x='216.0' y='230' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>intra-net vanish</text><line x1='376' y1='194' x2='416' y2='194' stroke='#111827' stroke-width='2'/><polygon points='416.0,194.0 406.0,199.0 406.0,189.0' fill='#111827'/><rect x='416' y='142' width='320' height='104' rx='10' fill='#f9fafb' stroke='#2563eb' stroke-width='1'/><rect x='416' y='142' width='320' height='26' rx='10' fill='#eff6ff' stroke='#2563eb' stroke-width='1'/><rect x='416' y='158' width='320' height='10' rx='0' fill='#eff6ff' stroke='none' stroke-width='1'/><text x='576.0' y='160' font-size='13' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>2  contract</text><text x='576.0' y='192' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>ON-connected nets -&gt;</text><text x='576.0' y='211' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>one super-node carrying</text><text x='576.0' y='230' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Courier New, monospace'>Q = SUM Cg * Ventry</text><line x1='736' y1='194' x2='776' y2='194' stroke='#111827' stroke-width='2'/><polygon points='776.0,194.0 766.0,199.0 766.0,189.0' fill='#111827'/><rect x='776' y='142' width='320' height='104' rx='10' fill='#f9fafb' stroke='#2563eb' stroke-width='1'/><rect x='776' y='142' width='320' height='26' rx='10' fill='#eff6ff' stroke='#2563eb' stroke-width='1'/><rect x='776' y='158' width='320' height='10' rx='0' fill='#eff6ff' stroke='none' stroke-width='1'/><text x='936.0' y='160' font-size='13' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>3  coupling matrix</text><text x='936.0' y='192' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Courier New, monospace'>Cc stamps A.V = b ;</text><text x='936.0' y='211' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>held nodes inject</text><text x='936.0' y='230' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>into the RHS b</text><line x1='1096' y1='194' x2='1136' y2='194' stroke='#111827' stroke-width='2'/><polygon points='1136.0,194.0 1126.0,199.0 1126.0,189.0' fill='#111827'/><rect x='1136' y='142' width='320' height='104' rx='10' fill='#f9fafb' stroke='#16a34a' stroke-width='1'/><rect x='1136' y='142' width='320' height='26' rx='10' fill='#eff6ff' stroke='#16a34a' stroke-width='1'/><rect x='1136' y='158' width='320' height='10' rx='0' fill='#eff6ff' stroke='none' stroke-width='1'/><text x='1296.0' y='160' font-size='13' text-anchor='middle' fill='#16a34a' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>4  solve</text><text x='1296.0' y='192' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>dense Gaussian solve</text><text x='1296.0' y='211' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Courier New, monospace'>-&gt; V (model voltage)</text><text x='1296.0' y='230' font-size='11.5' text-anchor='middle' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>singular -&gt; X</text><text x='56' y='326' font-size='18' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Three SPICE-free invariants (each ends PASS / FAIL)</text><rect x='56' y='354' width='1424' height='58' rx='8' fill='#ecfdf5' stroke='#a7f3d0' stroke-width='1'/><rect x='72' y='373' width='64' height='20' rx='10' fill='white' stroke='#16a34a' stroke-width='1'/><text x='104.0' y='387' font-size='11' text-anchor='middle' fill='#16a34a' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>PASS</text><text x='150' y='379' font-size='14' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>residual</text><text x='150' y='400' font-size='12.5' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>the solver solved its own system:  ||A.V - b|| ~ 0</text><rect x='56' y='422' width='1424' height='58' rx='8' fill='#ecfdf5' stroke='#a7f3d0' stroke-width='1'/><rect x='72' y='441' width='64' height='20' rx='10' fill='white' stroke='#16a34a' stroke-width='1'/><text x='104.0' y='455' font-size='11' text-anchor='middle' fill='#16a34a' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>PASS</text><text x='150' y='447' font-size='14' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>convex-hull bound</text><text x='150' y='468' font-size='12.5' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>every resolved V lies within the boundary potentials (a cap M-matrix average) -- outside the hull = a bug</text><rect x='56' y='490' width='1424' height='58' rx='8' fill='#ecfdf5' stroke='#a7f3d0' stroke-width='1'/><rect x='72' y='509' width='64' height='20' rx='10' fill='white' stroke='#16a34a' stroke-width='1'/><text x='104.0' y='523' font-size='11' text-anchor='middle' fill='#16a34a' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>PASS</text><text x='150' y='515' font-size='14' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>scalar cross-check</text><text x='150' y='536' font-size='12.5' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>an uncoupled super-node equals the closed-form charge-share V</text><rect x='56' y='712' width='1424' height='44' rx='8' fill='#FFF8E8' stroke='#d97706' stroke-width='1'/><text x='72' y='731' font-size='13' text-anchor='start' fill='#8a6d00' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>all voltages are MODEL predictions, UNVERIFIED vs SPICE.</text><text x='72' y='748' font-size='12.5' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>this resolve feeds the eventual P3; a node with no rail reference resolves to X, not a guessed value.</text><text x='56' y='838' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>source: engine/charge.py resolve_checked() -- voltages, derivations, and these invariants all from one call</text></svg>