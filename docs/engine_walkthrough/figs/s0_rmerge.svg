<svg xmlns='http://www.w3.org/2000/svg' width='1340' height='616' viewBox='0 0 1340 616'><defs><marker id='arrow' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6 Z' fill='#111827'/></marker></defs><rect width='1340' height='616' fill='white'/><text x='40' y='44' font-size='23' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Stage 0 -- recover the logical schematic from the LPE netlist</text><text x='40' y='70' font-size='14' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>real cells ship as layout-extracted soup: device terminals are private nodes, the wiring is parasitic R, and C is to-ground/coupling</text><rect x='40' y='96' width='360' height='364' rx='12' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='60' y='126' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>LPE netlist (delivered)</text><polyline points='80,165 133.0,152.5 140.0,141.5 147.0,152.5 200,158' fill='none' stroke='#9ca3af' stroke-width='1.4'/><polyline points='200,158 243.0,159.0 250.0,148.0 257.0,159.0 300,178' fill='none' stroke='#9ca3af' stroke-width='1.4'/><polyline points='95,235 150.5,231.0 157.5,220.0 164.5,231.0 220,245' fill='none' stroke='#9ca3af' stroke-width='1.4'/><polyline points='220,245 263.0,229.5 270.0,218.5 277.0,229.5 320,232' fill='none' stroke='#9ca3af' stroke-width='1.4'/><polyline points='85,315 140.5,311.0 147.5,300.0 154.5,311.0 210,325' fill='none' stroke='#9ca3af' stroke-width='1.4'/><polyline points='210,325 258.0,309.5 265.0,298.5 272.0,309.5 320,312' fill='none' stroke='#9ca3af' stroke-width='1.4'/><circle cx='80' cy='165' r='4.5' fill='#9ca3af'/><text x='88' y='169' font-size='10.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>XMSA2#d</text><circle cx='200' cy='158' r='4.5' fill='#9ca3af'/><text x='208' y='162' font-size='10.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>XMSA2#g</text><circle cx='300' cy='178' r='4.5' fill='#9ca3af'/><text x='308' y='182' font-size='10.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>XMSA3#s</text><circle cx='95' cy='235' r='4.5' fill='#9ca3af'/><text x='103' y='239' font-size='10.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>ml_a#1</text><circle cx='220' cy='245' r='4.5' fill='#9ca3af'/><text x='228' y='249' font-size='10.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>ml_a#2</text><circle cx='320' cy='232' r='4.5' fill='#9ca3af'/><text x='328' y='236' font-size='10.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>XMLA0#d</text><circle cx='85' cy='315' r='4.5' fill='#9ca3af'/><text x='93' y='319' font-size='10.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>clkb#1</text><circle cx='210' cy='325' r='4.5' fill='#9ca3af'/><text x='218' y='329' font-size='10.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>XCKA1#d</text><circle cx='320' cy='312' r='4.5' fill='#9ca3af'/><text x='328' y='316' font-size='10.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mq_a#3</text><circle cx='150' cy='388' r='4.5' fill='#9ca3af'/><text x='158' y='392' font-size='10.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>seb#2</text><text x='60' y='432' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' font-style='italic'>689 raw nodes  *  1033 parasitic R  *  C ignored for DC</text><text x='60' y='451' font-size='11' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' font-style='italic'>(zig-zag = a parasitic resistor)</text><rect x='430' y='96' width='470' height='364' rx='12' fill='#f1f5f9' stroke='#e5e7eb' stroke-width='1'/><text x='450' y='126' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>the four operations</text><circle cx='461' cy='164' r='11' fill='#111827'/><text x='461' y='168' font-size='13' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>1</text><text x='480' y='168' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>classify lines:  X = transistor (d g s b),</text><text x='480' y='185' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>R = parasitic (a short),  C = ignored for DC</text><circle cx='461' cy='228' r='11' fill='#111827'/><text x='461' y='232' font-size='13' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>2</text><text x='480' y='232' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>R-merge:  union-find contract every R</text><text x='480' y='249' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>-> 689 raw nodes collapse to node clusters</text><circle cx='461' cy='292' r='11' fill='#111827'/><text x='461' y='296' font-size='13' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>3</text><text x='480' y='296' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>name each net:  port > rail > common base</text><text x='480' y='313' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>of base#k members (ml_a#1,#2 -> ml_a)</text><circle cx='461' cy='356' r='11' fill='#111827'/><text x='461' y='360' font-size='13' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>4</text><text x='480' y='360' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>self-check:  two signal ports in one</text><text x='480' y='377' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>cluster => BRIDGE(FAIL) topology error</text><line x1='401' y1='278' x2='429' y2='278' stroke='#111827' stroke-width='2.5'/><polygon points='429.0,278.0 419.0,283.0 419.0,273.0' fill='#111827'/><line x1='901' y1='278' x2='929' y2='278' stroke='#111827' stroke-width='2.5'/><polygon points='929.0,278.0 919.0,283.0 919.0,273.0' fill='#111827'/><rect x='930' y='96' width='370' height='364' rx='12' fill='#eff6ff' stroke='#2563eb' stroke-width='1'/><text x='950' y='126' font-size='15' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>logical schematic (recovered)</text><ellipse cx='1010' cy='175' rx='33' ry='19' fill='white' stroke='#10b981' stroke-width='2'/><text x='1010' y='180' font-size='13.5' text-anchor='middle' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>CP</text><ellipse cx='1150' cy='168' rx='33' ry='19' fill='white' stroke='#10b981' stroke-width='2'/><text x='1150' y='173' font-size='13.5' text-anchor='middle' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mq_a</text><ellipse cx='1255' cy='200' rx='33' ry='19' fill='white' stroke='#10b981' stroke-width='2'/><text x='1255' y='205' font-size='13.5' text-anchor='middle' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>mq_b</text><ellipse cx='1030' cy='258' rx='33' ry='19' fill='white' stroke='#10b981' stroke-width='2'/><text x='1030' y='263' font-size='13.5' text-anchor='middle' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>ml_a</text><ellipse cx='1240' cy='290' rx='33' ry='19' fill='white' stroke='#10b981' stroke-width='2'/><text x='1240' y='295' font-size='13.5' text-anchor='middle' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Q</text><ellipse cx='1110' cy='350' rx='33' ry='19' fill='white' stroke='#10b981' stroke-width='2'/><text x='1110' y='355' font-size='13.5' text-anchor='middle' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>seb</text><ellipse cx='1245' cy='372' rx='33' ry='19' fill='white' stroke='#10b981' stroke-width='2'/><text x='1245' y='377' font-size='13.5' text-anchor='middle' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>clkb</text><text x='950' y='432' font-size='12' text-anchor='start' fill='#2563eb' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' font-style='italic'>92 logical nets = the real circuit nodes</text><rect x='40' y='478' width='1260' height='60' rx='10' fill='#ecfdf5' stroke='#a7f3d0' stroke-width='1'/><text x='58' y='502' font-size='14' text-anchor='start' fill='#065f46' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Net names (step 3) are cosmetic.</text><text x='58' y='524' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Downstream staging and bias are proven NAME-BLIND by the rename-invariance gate: obfuscate every internal name -> identical staging and identical P1 bias.</text><rect x='40' y='552' width='1260' height='48' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='60' y='581' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>689 raw nodes  ->  92 logical nets  via 1033 R     |     164 transistors     |  </text><text x='900' y='581' font-size='15' text-anchor='start' fill='#16a34a' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>bridges = 0</text><text x='1005' y='581' font-size='13' text-anchor='start' fill='#16a34a' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>(no mis-merge -- PASS)</text></svg>