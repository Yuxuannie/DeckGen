<svg xmlns='http://www.w3.org/2000/svg' width='1536' height='864' viewBox='0 0 1536 864'><rect width='1536' height='864' fill='white'/><text x='56' y='56' font-size='28' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>From the LPE netlist: capabilities -&gt; applications -&gt; ask</text><text x='56' y='86' font-size='15' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>honest status -- BUILT today / NEXT / forward-looking; every BUILT claim is true in the repo</text><line x1='56' y1='102' x2='1480' y2='102' stroke='#e5e7eb' stroke-width='1.5'/><text x='56' y='134' font-size='17' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>What the engine can do from the LPE netlist</text><text x='780' y='134' font-size='17' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Applications these outputs grow into</text><rect x='56' y='152' width='700' height='92' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='72' y='180' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Charge resolve</text><rect x='636' y='166' width='104' height='20' rx='10' fill='white' stroke='#16a34a' stroke-width='1'/><text x='688.0' y='180' font-size='11' text-anchor='middle' fill='#16a34a' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>BUILT</text><text x='72' y='204' font-size='12.5' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>floating internal-node voltage by charge conservation (Cg/Cc), invariant-checked</text><text x='72' y='228' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>engine/charge.py</text><rect x='56' y='260' width='700' height='92' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='72' y='288' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Coupling in the resolve</text><rect x='636' y='274' width='104' height='20' rx='10' fill='white' stroke='#16a34a' stroke-width='1'/><text x='688.0' y='288' font-size='11' text-anchor='middle' fill='#16a34a' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>BUILT</text><text x='72' y='312' font-size='12.5' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>a held aggressor's coupling already enters the resolve (the divider case)</text><text x='72' y='336' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>engine/charge.py : resolve()</text><rect x='56' y='368' width='700' height='92' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='72' y='396' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Aggressor / victim impact</text><rect x='636' y='382' width='104' height='20' rx='10' fill='white' stroke='#2563eb' stroke-width='1'/><text x='688.0' y='396' font-size='11' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>NEXT</text><text x='72' y='420' font-size='12.5' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>the coupling data (Cc) is in hand; a dedicated impact-analysis layer is the next step</text><text x='72' y='444' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>(layer not built)</text><rect x='56' y='476' width='700' height='92' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='72' y='504' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Cell fingerprint from LPE</text><rect x='636' y='490' width='104' height='20' rx='10' fill='white' stroke='#d97706' stroke-width='1'/><text x='688.0' y='504' font-size='11' text-anchor='middle' fill='#d97706' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>ROADMAP</text><text x='72' y='528' font-size='12.5' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>today's fingerprint is TEMPLATE-level (22 fingerprints -&gt; 5 families / 63 templates); cell-level LPE fingerprint is ahead</text><text x='72' y='552' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>docs/foundation/D_template_calibration.md</text><rect x='780' y='152' width='700' height='92' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='796' y='180' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Worst-case initialization</text><rect x='1360' y='166' width='104' height='20' rx='10' fill='white' stroke='#d97706' stroke-width='1'/><text x='1412.0' y='180' font-size='11' text-anchor='middle' fill='#d97706' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>HYPOTHESIS</text><text x='796' y='204' font-size='12.5' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>the resolved internal voltage is what a correct worst-case init must reflect (S3 sync init is still a {None} placeholder)</text><text x='796' y='228' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>forward-looking</text><rect x='780' y='260' width='700' height='92' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='796' y='288' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>AIQC feature</text><rect x='1360' y='274' width='104' height='20' rx='10' fill='white' stroke='#d97706' stroke-width='1'/><text x='1412.0' y='288' font-size='11' text-anchor='middle' fill='#d97706' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>DIRECTION</text><text x='796' y='312' font-size='12.5' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>topology + charge as features for topology-aware sampling, upgrading MLQC</text><text x='796' y='336' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>forward-looking</text><rect x='780' y='368' width='700' height='92' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='796' y='396' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Reverse-engineering</text><rect x='1360' y='382' width='104' height='20' rx='10' fill='white' stroke='#d97706' stroke-width='1'/><text x='1412.0' y='396' font-size='11' text-anchor='middle' fill='#d97706' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>DIRECTION</text><text x='796' y='420' font-size='12.5' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>CCC + charge recover cell behaviour from LPE structure, naming-independent</text><text x='796' y='444' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='Courier New, monospace'>forward-looking</text><rect x='56' y='636' width='1424' height='96' rx='12' fill='#eff6ff' stroke='#2563eb' stroke-width='1'/><text x='76' y='668' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>The engine has the capability base. Which application we build next -- and how -- depends on the problems your team most wants solved.</text><text x='76' y='696' font-size='14' text-anchor='start' fill='#374151' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>The flows are co-built, with your team as the owner of what matters; that is the conversation 