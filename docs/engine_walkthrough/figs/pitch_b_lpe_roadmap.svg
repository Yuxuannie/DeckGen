<svg xmlns='http://www.w3.org/2000/svg' width='1536' height='864' viewBox='0 0 1536 864'><rect width='1536' height='864' fill='white'/><text x='56' y='58' font-size='30' text-anchor='start' fill='#211C30' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>From the LPE netlist: capabilities -&gt; applications -&gt; ask</text><text x='56' y='88' font-size='16' text-anchor='start' fill='#8A82A0' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>honest status -- BUILT today / NEXT / forward-looking; every BUILT claim is true in the repo</text><line x1='56' y1='104' x2='1480' y2='104' stroke='#D7CFE8' stroke-width='1.5'/><text x='56' y='138' font-size='17' text-anchor='start' fill='#5B3E8E' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>What the engine can do from the LPE netlist</text><text x='780' y='138' font-size='17' text-anchor='start' fill='#5B3E8E' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Applications these outputs grow into</text><rect x='56' y='156' width='700' height='92' rx='10' fill='#F6F2FB' stroke='#D7CFE8' stroke-width='1'/><text x='72' y='184' font-size='15' text-anchor='start' fill='#211C30' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Charge resolve</text><rect x='636' y='170' width='104' height='20' rx='10' fill='white' stroke='#2E8B57' stroke-width='1'/><text x='688.0' y='184' font-size='11' text-anchor='middle' fill='#2E8B57' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>BUILT</text><text x='72' y='208' font-size='12.5' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>floating internal-node voltage by charge conservation (Cg/Cc), invariant-checked</text><text x='72' y='232' font-size='11.5' text-anchor='start' fill='#8A82A0' font-weight='normal' font-family='Courier New, monospace'>engine/charge.py</text><rect x='56' y='264' width='700' height='92' rx='10' fill='#F6F2FB' stroke='#D7CFE8' stroke-width='1'/><text x='72' y='292' font-size='15' text-anchor='start' fill='#211C30' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Coupling in the resolve</text><rect x='636' y='278' width='104' height='20' rx='10' fill='white' stroke='#2E8B57' stroke-width='1'/><text x='688.0' y='292' font-size='11' text-anchor='middle' fill='#2E8B57' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>BUILT</text><text x='72' y='316' font-size='12.5' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>a fixed aggressor's coupling already enters the resolve (the divider case)</text><text x='72' y='340' font-size='11.5' text-anchor='start' fill='#8A82A0' font-weight='normal' font-family='Courier New, monospace'>engine/charge.py : resolve()</text><rect x='56' y='372' width='700' height='92' rx='10' fill='#F6F2FB' stroke='#D7CFE8' stroke-width='1'/><text x='72' y='400' font-size='15' text-anchor='start' fill='#211C30' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Aggressor / victim impact</text><rect x='636' y='386' width='104' height='20' rx='10' fill='white' stroke='#5B3E8E' stroke-width='1'/><text x='688.0' y='400' font-size='11' text-anchor='middle' fill='#5B3E8E' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>NEXT</text><text x='72' y='424' font-size='12.5' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>the coupling data (Cc) is in hand; a dedicated impact-analysis layer is the next step</text><text x='72' y='448' font-size='11.5' text-anchor='start' fill='#8A82A0' font-weight='normal' font-family='Courier New, monospace'>(layer not built)</text><rect x='56' y='480' width='700' height='92' rx='10' fill='#F6F2FB' stroke='#D7CFE8' stroke-width='1'/><text x='72' y='508' font-size='15' text-anchor='start' fill='#211C30' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Cell fingerprint from LPE</text><rect x='636' y='494' width='104' height='20' rx='10' fill='white' stroke='#B8860B' stroke-width='1'/><text x='688.0' y='508' font-size='11' text-anchor='middle' fill='#B8860B' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>ROADMAP</text><text x='72' y='532' font-size='12.5' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>today's fingerprint is TEMPLATE-level (22 fingerprints -&gt; 5 families / 63 templates); cell-level LPE fingerprint is ahead</text><text x='72' y='556' font-size='11.5' text-anchor='start' fill='#8A82A0' font-weight='normal' font-family='Courier New, monospace'>docs/foundation/D_template_calibration.md</text><rect x='780' y='156' width='700' height='92' rx='10' fill='#F6F2FB' stroke='#D7CFE8' stroke-width='1'/><text x='796' y='184' font-size='15' text-anchor='start' fill='#211C30' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Worst-case initialization</text><rect x='1360' y='170' width='104' height='20' rx='10' fill='white' stroke='#B8860B' stroke-width='1'/><text x='1412.0' y='184' font-size='11' text-anchor='middle' fill='#B8860B' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>HYPOTHESIS</text><text x='796' y='208' font-size='12.5' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>the resolved internal voltage is what a correct worst-case init must reflect (S3 sync init is still a {None} placeholder)</text><text x='796' y='232' font-size='11.5' text-anchor='start' fill='#8A82A0' font-weight='normal' font-family='Courier New, monospace'>forward-looking</text><rect x='780' y='264' width='700' height='92' rx='10' fill='#F6F2FB' stroke='#D7CFE8' stroke-width='1'/><text x='796' y='292' font-size='15' text-anchor='start' fill='#211C30' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>AIQC feature</text><rect x='1360' y='278' width='104' height='20' rx='10' fill='white' stroke='#B8860B' stroke-width='1'/><text x='1412.0' y='292' font-size='11' text-anchor='middle' fill='#B8860B' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>DIRECTION</text><text x='796' y='316' font-size='12.5' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>topology + charge as features for topology-aware sampling, upgrading MLQC</text><text x='796' y='340' font-size='11.5' text-anchor='start' fill='#8A82A0' font-weight='normal' font-family='Courier New, monospace'>forward-looking</text><rect x='780' y='372' width='700' height='92' rx='10' fill='#F6F2FB' stroke='#D7CFE8' stroke-width='1'/><text x='796' y='400' font-size='15' text-anchor='start' fill='#211C30' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>Reverse-engineering</text><rect x='1360' y='386' width='104' height='20' rx='10' fill='white' stroke='#B8860B' stroke-width='1'/><text x='1412.0' y='400' font-size='11' text-anchor='middle' fill='#B8860B' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>DIRECTION</text><text x='796' y='424' font-size='12.5' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>CCC + charge recover cell behaviour from LPE structure, naming-independent</text><text x='796' y='448' font-size='11.5' text-anchor='start' fill='#8A82A0' font-weight='normal' font-family='Courier New, monospace'>forward-looking</text><rect x='56' y='640' width='1424' height='96' rx='12' fill='#E7DEF4' stroke='#5B3E8E' stroke-width='1'/><text x='76' y='672' font-size='15' text-anchor='start' fill='#211C30' font-weight='bold' font-family='Arial, Helvetica, sans-serif'>The engine has the capability base. Which application we build next -- and how -- depends on the problems your team most wants solved.</text><text x='76' y='700' font-size='14' text-anchor='start' fill='#3C3654' font-weight='normal' font-family='Arial, Helvetica, sans-serif'>The flows are co-built, with your team as the owner of what matters; that is the conversation we want to have.</text><text x='56' y='836' font-size='12.5' text-anchor='start' fill='#8A82A0' font-weight='normal' font-family='Courier New, monospace'>Built today: engine/charge.py (Pillar 3), P1/P2/P3 --verify sidecar (core/verify_sidecar.py).</text></svg>