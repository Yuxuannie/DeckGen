<svg xmlns='http://www.w3.org/2000/svg' width='1480' height='560' viewBox='0 0 1480 560'><defs><marker id='arrow' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6 Z' fill='#111827'/></marker></defs><rect width='1480' height='560' fill='white'/><text x='40' y='44' font-size='23' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Union-find: how raw nodes merge into logical nets (S0)</text><text x='40' y='70' font-size='14' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>find(x) = your group's root;  union(a, b) = merge two groups -- ALWAYS root-to-root</text><circle cx='760' cy='40' r='9' fill='#2563eb'/><text x='774' y='44' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>= root (points to itself)</text><circle cx='980' cy='40' r='9' fill='white' stroke='#2563eb' stroke-width='2'/><text x='994' y='44' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>= member;  arrow = 'my parent'</text><rect x='56' y='118' width='252' height='232' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='72' y='144' font-size='13.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>start</text><circle cx='118' cy='210' r='14' fill='#2563eb'/><text x='118' y='214' font-size='12' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>a</text><circle cx='118' cy='290' r='14' fill='#2563eb'/><text x='118' y='294' font-size='12' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>b</text><circle cx='238' cy='210' r='14' fill='#2563eb'/><text x='238' y='214' font-size='12' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>c</text><circle cx='238' cy='290' r='14' fill='#2563eb'/><text x='238' y='294' font-size='12' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>d</text><text x='72' y='336' font-size='11' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>parent[x] = x (self)</text><rect x='338' y='118' width='252' height='232' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='354' y='144' font-size='13.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>union(a, b)</text><line x1='400.0' y1='275.0' x2='400.0' y2='225.0' stroke='#111827' stroke-width='2'/><polygon points='400.0,225.0 405.0,235.0 395.0,235.0' fill='#111827'/><circle cx='400' cy='210' r='14' fill='#2563eb'/><text x='400' y='214' font-size='12' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>a</text><circle cx='400' cy='290' r='14' fill='white' stroke='#2563eb' stroke-width='2'/><text x='400' y='294' font-size='12' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>b</text><circle cx='520' cy='210' r='14' fill='#2563eb'/><text x='520' y='214' font-size='12' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>c</text><circle cx='520' cy='290' r='14' fill='#2563eb'/><text x='520' y='294' font-size='12' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>d</text><text x='354' y='336' font-size='11' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>b's parent = a</text><rect x='620' y='118' width='252' height='232' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='636' y='144' font-size='13.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>union(c, d)</text><line x1='682.0' y1='275.0' x2='682.0' y2='225.0' stroke='#111827' stroke-width='2'/><polygon points='682.0,225.0 687.0,235.0 677.0,235.0' fill='#111827'/><line x1='802.0' y1='275.0' x2='802.0' y2='225.0' stroke='#111827' stroke-width='2'/><polygon points='802.0,225.0 807.0,235.0 797.0,235.0' fill='#111827'/><circle cx='682' cy='210' r='14' fill='#2563eb'/><text x='682' y='214' font-size='12' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>a</text><circle cx='682' cy='290' r='14' fill='white' stroke='#2563eb' stroke-width='2'/><text x='682' y='294' font-size='12' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>b</text><circle cx='802' cy='210' r='14' fill='#2563eb'/><text x='802' y='214' font-size='12' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>c</text><circle cx='802' cy='290' r='14' fill='white' stroke='#2563eb' stroke-width='2'/><text x='802' y='294' font-size='12' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>d</text><text x='636' y='336' font-size='11' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>d's parent = c</text><rect x='902' y='118' width='252' height='232' rx='10' fill='#fef9ec' stroke='#d97706' stroke-width='1'/><text x='918' y='144' font-size='13.5' text-anchor='start' fill='#d97706' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>union(b, c)</text><line x1='964.0' y1='275.0' x2='964.0' y2='225.0' stroke='#111827' stroke-width='2'/><polygon points='964.0,225.0 969.0,235.0 959.0,235.0' fill='#111827'/><line x1='1069.0' y1='210.0' x2='979.0' y2='210.0' stroke='#111827' stroke-width='2'/><polygon points='979.0,210.0 989.0,205.0 989.0,215.0' fill='#111827'/><line x1='1084.0' y1='275.0' x2='1084.0' y2='225.0' stroke='#111827' stroke-width='2'/><polygon points='1084.0,225.0 1089.0,235.0 1079.0,235.0' fill='#111827'/><circle cx='964' cy='210' r='14' fill='#2563eb'/><text x='964' y='214' font-size='12' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>a</text><circle cx='964' cy='290' r='14' fill='white' stroke='#2563eb' stroke-width='2'/><text x='964' y='294' font-size='12' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>b</text><circle cx='1084' cy='210' r='14' fill='white' stroke='#2563eb' stroke-width='2'/><text x='1084' y='214' font-size='12' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>c</text><circle cx='1084' cy='290' r='14' fill='white' stroke='#2563eb' stroke-width='2'/><text x='1084' y='294' font-size='12' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>d</text><text x='918' y='336' font-size='11' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>find roots a, c -> c points to a</text><rect x='1184' y='118' width='252' height='232' rx='10' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='1200' y='144' font-size='13.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>find(d): compress</text><line x1='1246.0' y1='275.0' x2='1246.0' y2='225.0' stroke='#111827' stroke-width='2'/><polygon points='1246.0,225.0 1251.0,235.0 1241.0,235.0' fill='#111827'/><line x1='1351.0' y1='210.0' x2='1261.0' y2='210.0' stroke='#111827' stroke-width='2'/><polygon points='1261.0,210.0 1271.0,205.0 1271.0,215.0' fill='#111827'/><line x1='1353.5192455849324' y1='281.6794970566216' x2='1258.4807544150676' y2='218.32050294337844' stroke='#111827' stroke-width='2'/><polygon points='1258.5,218.3 1269.6,219.7 1264.0,228.0' fill='#111827'/><circle cx='1246' cy='210' r='14' fill='#2563eb'/><text x='1246' y='214' font-size='12' text-anchor='middle' fill='white' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>a</text><circle cx='1246' cy='290' r='14' fill='white' stroke='#2563eb' stroke-width='2'/><text x='1246' y='294' font-size='12' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>b</text><circle cx='1366' cy='210' r='14' fill='white' stroke='#2563eb' stroke-width='2'/><text x='1366' y='214' font-size='12' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>c</text><circle cx='1366' cy='290' r='14' fill='white' stroke='#2563eb' stroke-width='2'/><text x='1366' y='294' font-size='12' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>d</text><text x='1200' y='336' font-size='11' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>d re-points straight to a</text><line x1='308' y1='234' x2='338' y2='234' stroke='#6b7280' stroke-width='2'/><polygon points='338.0,234.0 328.0,239.0 328.0,229.0' fill='#6b7280'/><line x1='590' y1='234' x2='620' y2='234' stroke='#6b7280' stroke-width='2'/><polygon points='620.0,234.0 610.0,239.0 610.0,229.0' fill='#6b7280'/><line x1='872' y1='234' x2='902' y2='234' stroke='#6b7280' stroke-width='2'/><polygon points='902.0,234.0 892.0,239.0 892.0,229.0' fill='#6b7280'/><line x1='1154' y1='234' x2='1184' y2='234' stroke='#6b7280' stroke-width='2'/><polygon points='1184.0,234.0 1174.0,239.0 1174.0,229.0' fill='#6b7280'/><text x='56' y='374' font-size='15' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Then GROUP by root:</text><text x='232' y='374' font-size='14' text-anchor='start' fill='#374151' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>every node with the same root = one logical net.</text><text x='56' y='400' font-size='13' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>real example -- ml_a:  7 resistors (R41..R47) merge 8 raw nodes {ml_a#1, XMSA4#d, ..., ml_a#2} into ONE net.</text><text x='56' y='420' font-size='13' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>the root is just an internal id;  the NAME 'ml_a' = the most common base among members (cosmetic).</text><rect x='56' y='496' width='1368' height='46' rx='10' fill='#ecfdf5' stroke='#a7f3d0' stroke-width='1'/><text x='74' y='525' font-size='14' text-anchor='start' fill='#065f46' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>689 raw nodes  --[1033 unions over resistors]->  92 logical nets.</text><text x='720' y='525' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>the SAME union-find runs again in S1 over transistor channels -> 39 CCCs.</text></svg>