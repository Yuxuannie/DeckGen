<svg xmlns='http://www.w3.org/2000/svg' width='1400' height='600' viewBox='0 0 1400 600'><defs><marker id='arrow' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6 Z' fill='#111827'/></marker></defs><rect width='1400' height='600' fill='white'/><text x='40' y='44' font-size='23' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>Union-find: how raw nodes merge into logical nets (S0)</text><text x='40' y='70' font-size='14' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>a disjoint-set structure with two ops -- find(x) = which group is x in;  union(a, b) = merge two groups</text><rect x='40' y='92' width='380' height='430' rx='12' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='60' y='120' font-size='14.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>1) start: each raw node = its own set</text><circle cx='110' cy='180' r='28' fill='white' stroke='#9ca3af' stroke-width='2'/><text x='110' y='184' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>ml_a#1</text><circle cx='290' cy='180' r='28' fill='white' stroke='#9ca3af' stroke-width='2'/><text x='290' y='184' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>XMSA4#d</text><circle cx='110' cy='270' r='28' fill='white' stroke='#9ca3af' stroke-width='2'/><text x='110' y='274' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>XMSA5#d</text><circle cx='290' cy='270' r='28' fill='white' stroke='#9ca3af' stroke-width='2'/><text x='290' y='274' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>XMLA0#g</text><circle cx='110' cy='360' r='28' fill='white' stroke='#9ca3af' stroke-width='2'/><text x='110' y='364' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>XMLA1#g</text><circle cx='290' cy='360' r='28' fill='white' stroke='#9ca3af' stroke-width='2'/><text x='290' y='364' font-size='10.5' text-anchor='middle' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>XMFA1#d</text><text x='60' y='500' font-size='12.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>689 singletons;  find(x) = x</text><rect x='440' y='92' width='470' height='430' rx='12' fill='#f1f5f9' stroke='#e5e7eb' stroke-width='1'/><text x='460' y='120' font-size='14.5' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>2) for each resistor R(a, b):  union(a, b)</text><text x='462' y='150' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>R41:  ml_a#1  --  XMSA4#d</text><text x='462' y='169' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>R42:  XMSA4#d  --  XMSA5#d</text><text x='462' y='188' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>R43:  XMSA5#d  --  XMLA0#g</text><text x='462' y='207' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>R44:  XMLA0#g  --  XMLA1#g</text><text x='462' y='226' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>R47:  XMFA1#d  --  ml_a#1</text><circle cx='675' cy='300' r='26' fill='white' stroke='#2563eb' stroke-width='2'/><text x='675' y='305' font-size='13' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>root</text><line x1='540.1671195573819' y1='386.98895512426975' x2='654.8328804426181' y2='313.01104487573025' stroke='#111827' stroke-width='2'/><polygon points='654.8,313.0 649.1,322.6 643.7,314.2' fill='#111827'/><circle cx='520' cy='400' r='20' fill='white' stroke='#111827' stroke-width='1.5'/><line x1='611.9933388837499' y1='409.21154593483357' x2='663.0066611162501' y2='320.78845406516643' stroke='#111827' stroke-width='2'/><polygon points='663.0,320.8 662.3,331.9 653.7,327.0' fill='#111827'/><circle cx='600' cy='430' r='20' fill='white' stroke='#111827' stroke-width='1.5'/><line x1='678.9102161379524' y1='386.0247550349528' x2='676.0897838620476' y2='323.9752449650472' stroke='#111827' stroke-width='2'/><polygon points='676.1,324.0 681.5,333.7 671.5,334.2' fill='#111827'/><circle cx='680' cy='410' r='20' fill='white' stroke='#111827' stroke-width='1.5'/><line x1='746.8660152884152' y1='409.9127292646349' x2='688.1339847115848' y2='320.0872707353651' stroke='#111827' stroke-width='2'/><polygon points='688.1,320.1 697.8,325.7 689.4,331.2' fill='#111827'/><circle cx='760' cy='430' r='20' fill='white' stroke='#111827' stroke-width='1.5'/><line x1='819.4752520427036' y1='387.5607588137597' x2='695.5247479572964' y2='312.4392411862403' stroke='#111827' stroke-width='2'/><polygon points='695.5,312.4 706.7,313.3 701.5,321.9' fill='#111827'/><circle cx='840' cy='400' r='20' fill='white' stroke='#111827' stroke-width='1.5'/><text x='460' y='470' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>child -> parent edges; root = the set's representative</text><text x='460' y='490' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>(deterministic: the smaller raw-node name becomes root)</text><text x='460' y='510' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>find(x): walk to root, then re-point x straight at it (path compression)</text><rect x='930' y='92' width='430' height='430' rx='12' fill='#eff6ff' stroke='#2563eb' stroke-width='1'/><text x='950' y='120' font-size='14.5' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>3) one set = one logical net</text><circle cx='1145' cy='250' r='28' fill='white' stroke='#2563eb' stroke-width='2'/><text x='1145' y='255' font-size='13' text-anchor='middle' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>rep</text><line x1='1237.0' y1='250.0' x2='1173.0' y2='250.0' stroke='#93c5fd' stroke-width='2'/><polygon points='1173.0,250.0 1183.0,245.0 1183.0,255.0' fill='#93c5fd'/><circle cx='1265' cy='250' r='16' fill='white' stroke='#2563eb' stroke-width='1.5'/><line x1='1188.465720157242' y1='309.40315088156393' x2='1161.534279842758' y2='272.59684911843607' stroke='#93c5fd' stroke-width='2'/><polygon points='1161.5,272.6 1171.5,277.7 1163.4,283.6' fill='#93c5fd'/><circle cx='1205' cy='332' r='16' fill='white' stroke='#2563eb' stroke-width='1.5'/><line x1='1102.3532297565002' y1='309.2717823723216' x2='1128.6467702434998' y2='272.7282176276784' stroke='#93c5fd' stroke-width='2'/><polygon points='1128.6,272.7 1126.9,283.8 1118.7,277.9' fill='#93c5fd'/><circle cx='1086' cy='332' r='16' fill='white' stroke='#2563eb' stroke-width='1.5'/><line x1='1053.0' y1='250.0' x2='1117.0' y2='250.0' stroke='#93c5fd' stroke-width='2'/><polygon points='1117.0,250.0 1107.0,255.0 1107.0,245.0' fill='#93c5fd'/><circle cx='1025' cy='250' r='16' fill='white' stroke='#2563eb' stroke-width='1.5'/><line x1='1101.534279842758' y1='190.59684911843604' x2='1128.465720157242' y2='227.40315088156396' stroke='#93c5fd' stroke-width='2'/><polygon points='1128.5,227.4 1118.5,222.3 1126.6,216.4' fill='#93c5fd'/><circle cx='1085' cy='168' r='16' fill='white' stroke='#2563eb' stroke-width='1.5'/><line x1='1188.465720157242' y1='190.59684911843604' x2='1161.534279842758' y2='227.40315088156396' stroke='#93c5fd' stroke-width='2'/><polygon points='1161.5,227.4 1163.4,216.4 1171.5,222.3' fill='#93c5fd'/><circle cx='1205' cy='168' r='16' fill='white' stroke='#2563eb' stroke-width='1.5'/><text x='1145' y='410' font-size='14' text-anchor='middle' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>this set = logical net  ml_a</text><text x='950' y='445' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>after path compression every member points straight at the</text><text x='950' y='463' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>representative -> find is near O(1)</text><text x='950' y='488' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>the NAME 'ml_a' = the most common base#k among members</text><text x='950' y='506' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>(cosmetic; the representative is just an internal id)</text><rect x='40' y='538' width='1320' height='48' rx='10' fill='#ecfdf5' stroke='#a7f3d0' stroke-width='1'/><text x='58' y='567' font-size='14' text-anchor='start' fill='#065f46' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>689 raw nodes  --[1033 unions over resistors]->  92 logical nets.</text><text x='720' y='567' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif'>The SAME union-find runs again in S1 over transistor channels -> 39 CCCs.</text></svg>