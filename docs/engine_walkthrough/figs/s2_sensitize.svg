<svg xmlns='http://www.w3.org/2000/svg' width='1320' height='660' viewBox='0 0 1320 660'><defs><marker id='arrow' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6 Z' fill='#111827'/></marker></defs><rect width='1320' height='660' fill='white'/><text x='40' y='46' font-size='24' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >Stage 2 -- Sensitization is DERIVED, per arc (Boolean difference)</text><text x='40' y='74' font-size='15' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >hold side pins static, toggle the measured pin, require the captured node to follow it; then classify each side pin by toggling it</text><rect x='40' y='100' width='600' height='470' rx='12' fill='#f9fafb' stroke='#e5e7eb' stroke-width='1'/><text x='60' y='132' font-size='17' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >How the bias is derived</text><text x='60' y='158' font-size='14' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >arc this run measured:  hold(CP, D)</text><text x='60' y='178' font-size='12' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >(the engine's default in --netlist mode; sides = CD, SE, SI)</text><text x='60' y='206' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >test:  d(capture)/d(D) = 1  under a static side-pin hold,</text><text x='60' y='224' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >then toggle each side pin 0/1 and watch capture:</text><rect x='60' y='250' width='560' height='34' rx='0' fill='#eef2ff' stroke='#e5e7eb' stroke-width='1'/><text x='72' y='272' font-size='12' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >side pin</text><text x='210' y='272' font-size='12' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >toggling it changes capture?</text><text x='490' y='272' font-size='12' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >role</text><text x='570' y='272' font-size='12' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >bias</text><rect x='60' y='284' width='560' height='40' rx='0' fill='white' stroke='#e5e7eb' stroke-width='1'/><text x='72' y='309' font-size='14' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >CD</text><text x='210' y='309' font-size='12' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >yes -- a clear destroys the captured value</text><text x='490' y='309' font-size='12' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >required</text><text x='570' y='309' font-size='14' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >0</text><rect x='60' y='324' width='560' height='40' rx='0' fill='white' stroke='#e5e7eb' stroke-width='1'/><text x='72' y='349' font-size='14' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >SE</text><text x='210' y='349' font-size='12' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >yes -- selects the D path vs the SI path</text><text x='490' y='349' font-size='12' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >required</text><text x='570' y='349' font-size='14' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >0</text><rect x='60' y='364' width='560' height='40' rx='0' fill='white' stroke='#e5e7eb' stroke-width='1'/><text x='72' y='389' font-size='14' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >SI</text><text x='210' y='389' font-size='12' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >no  -- capture independent of it at SE=0</text><text x='490' y='389' font-size='12' text-anchor='start' fill='#d97706' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >masked</text><text x='570' y='389' font-size='14' text-anchor='start' fill='#d97706' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >1</text><text x='60' y='450' font-size='14' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >=> D controls capture; SI masked  =>  </text><text x='430' y='450' font-size='15' text-anchor='start' fill='#16a34a' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >P1 PASS</text><text x='60' y='476' font-size='13' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >result:  biases {CD=0, SE=0, SI=1}</text><rect x='670' y='100' width='610' height='470' rx='12' fill='#fffbeb' stroke='#fde68a' stroke-width='1'/><text x='690' y='132' font-size='16' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >Reading the bias vs template.tcl define_arc (WHEN)</text><text x='690' y='160' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >the bias above is derived from PHYSICS, independent of define_arc;</text><text x='690' y='178' font-size='13' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >the engine then cross-checks it against the arc's WHEN:</text><circle cx='702' cy='206' r='5' fill='#2563eb'/><text x='718' y='210' font-size='13' text-anchor='start' fill='#2563eb' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >REQUIRED pin agrees with WHEN</text><text x='718' y='229' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >AGREE -- the arc as written sensitizes the path</text><circle cx='702' cy='258' r='5' fill='#dc2626'/><text x='718' y='262' font-size='13' text-anchor='start' fill='#dc2626' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >REQUIRED pin conflicts with WHEN</text><text x='718' y='281' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >DISAGREE (named) -- arc would mis-sensitize: investigate</text><circle cx='702' cy='310' r='5' fill='#6b7280'/><text x='718' y='314' font-size='13' text-anchor='start' fill='#6b7280' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >REQUIRED pin missing from WHEN</text><text x='718' y='333' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >engine supplies it; WHEN is incomplete -- add it</text><circle cx='702' cy='362' r='5' fill='#d97706'/><text x='718' y='366' font-size='13' text-anchor='start' fill='#d97706' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >MASKED pin (any value in WHEN)</text><text x='718' y='385' font-size='12.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >non-critical hold; mismatch is harmless</text><rect x='690' y='410' width='570' height='70' rx='8' fill='white' stroke='#fde68a' stroke-width='1'/><text x='704' y='432' font-size='13' text-anchor='start' fill='#111827' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >actionable signal = the set-pin AGREE / DISAGREE.</text><text x='704' y='452' font-size='12.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >MASKED pins are don't-cares; do not chase them.</text><text x='704' y='470' font-size='11.5' text-anchor='start' fill='#6b7280' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >example:  arc.when {SE:0, SI:1} vs derived {SE=0} -> AGREE [set pins match]</text><rect x='40' y='590' width='1240' height='50' rx='10' fill='#fef2f2' stroke='#fecaca' stroke-width='1'/><text x='60' y='612' font-size='15' text-anchor='start' fill='#dc2626' font-weight='bold' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >Sensitization is PER ARC.</text><text x='255' y='612' font-size='13.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >the CD min-pulse-width arc (rel=constr=CD, WHEN=CP,D,SE,SI) has a different side set and a different bias --</text><text x='60' y='631' font-size='13.5' text-anchor='start' fill='#111827' font-weight='normal' font-family='DejaVu Sans, Arial, Helvetica, sans-serif' >specify the arc; do not read this hold(CP,D) bias as the MPW bias. (rel==constr MPW is a current engine gap.)</text></svg>